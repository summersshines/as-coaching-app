<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AS Coaching</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f4f4f0;color:#222;font-size:13px;min-height:100vh;}
.gold-bar{height:4px;background:linear-gradient(90deg,#EF9F27,#f5c76e,#EF9F27);}
.hdr{background:#1a3a2a;padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.hdr-brand{color:#EF9F27;font-family:Georgia,serif;font-size:1.3rem;font-weight:bold;letter-spacing:1px;flex:1;}
.hdr-brand span{color:#a8c4b0;font-size:.75rem;font-weight:normal;display:block;letter-spacing:.5px;margin-top:1px;}
.sync-wrap{display:flex;align-items:center;gap:5px;font-size:10px;color:#a8c4b0;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#4caf50;flex-shrink:0;}
.sync-dot.off{background:#ff5252;}
.tabs{background:#0F6E56;display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;position:sticky;top:56px;z-index:99;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:12px 16px;font-size:12px;font-weight:700;color:rgba(255,255,255,.55);cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;transition:all .2s;-webkit-tap-highlight-color:transparent;}
.tab.active{color:#EF9F27;border-bottom-color:#EF9F27;}
.tab:hover:not(.active){color:#fff;}
.content{padding:16px;max-width:680px;margin:0 auto;}
.panel{display:none;}.panel.active{display:block;}
#loading{position:fixed;inset:0;background:rgba(26,58,42,.94);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;color:white;gap:14px;}
.spinner{width:38px;height:38px;border:4px solid rgba(255,255,255,.2);border-top-color:#EF9F27;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#loading p{font-size:13px;opacity:.8;}

/* ── STUDENTS ── */
.search-bar{width:100%;border:2px solid #0F6E56;border-radius:10px;padding:11px 14px;font-size:15px;font-family:inherit;background:#fff;margin-bottom:12px;-webkit-appearance:none;transition:border .2s;}
.search-bar:focus{outline:none;border-color:#1a3a2a;}
.student-count{font-size:11px;color:#888;margin-bottom:10px;}
.student-list{display:flex;flex-direction:column;gap:8px;}
.student-card{background:#fff;border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);cursor:pointer;transition:box-shadow .2s;border-left:4px solid #0F6E56;-webkit-tap-highlight-color:transparent;}
.student-card:hover{box-shadow:0 3px 12px rgba(0,0,0,.12);}
.student-avatar{width:38px;height:38px;border-radius:50%;background:#d4ede1;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#0F6E56;flex-shrink:0;}
.student-info{flex:1;min-width:0;}
.student-name{font-size:14px;font-weight:800;color:#1a3a2a;}
.student-club{font-size:11px;color:#888;margin-top:2px;}
.student-arrow{font-size:14px;color:#ccc;flex-shrink:0;}
.student-del{font-size:16px;cursor:pointer;color:#ddd;padding:4px;transition:color .2s;flex-shrink:0;}
.student-del:hover{color:#e55;}
.empty-state{text-align:center;padding:48px 20px;color:#999;}
.empty-state .empty-icon{font-size:40px;margin-bottom:12px;}
.empty-state p{font-size:13px;line-height:1.6;}
.add-btn{width:100%;padding:14px;background:#0F6E56;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-tap-highlight-color:transparent;transition:background .2s;}
.add-btn:hover{background:#1a3a2a;}

/* ── PROFILE ── */
.back-btn{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:#0F6E56;font-size:13px;font-weight:700;cursor:pointer;padding:0 0 14px 0;-webkit-tap-highlight-color:transparent;}
.profile-hdr{background:linear-gradient(135deg,#1a3a2a,#0F6E56);border-radius:12px;padding:18px 16px;margin-bottom:14px;display:flex;align-items:center;gap:14px;}
.profile-av{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#EF9F27;flex-shrink:0;}
.profile-hdr-info{flex:1;}
.profile-hdr-name{font-size:17px;font-weight:900;color:#fff;}
.profile-hdr-club{font-size:11px;color:#a8c4b0;margin-top:3px;}
.autosave-ind{font-size:10px;color:#a8c4b0;margin-top:4px;min-height:14px;}
.section-card{background:#fff;border-radius:12px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden;}
.section-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;}
.section-hdr:hover{background:#fafafa;}
.section-title{font-size:13px;font-weight:800;color:#1a3a2a;display:flex;align-items:center;gap:8px;}
.section-chev{font-size:12px;color:#aaa;transition:transform .2s;}
.section-chev.open{transform:rotate(180deg);}
.section-body{display:none;padding:0 16px 16px;}
.section-body.open{display:block;}
.item-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
.item-row{display:flex;align-items:flex-start;gap:8px;background:#f4f4f0;border-radius:8px;padding:10px 12px;}
.item-text{flex:1;font-size:13px;color:#333;line-height:1.5;}
.item-del{background:none;border:none;color:#ccc;cursor:pointer;font-size:15px;padding:0 2px;flex-shrink:0;transition:color .2s;line-height:1;}
.item-del:hover{color:#e55;}
.add-item-row{display:flex;gap:8px;align-items:center;}
.add-item-input{flex:1;border:1.5px solid #ddd;border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit;background:#fafafa;-webkit-appearance:none;transition:border .2s;}
.add-item-input:focus{outline:none;border-color:#0F6E56;background:#fff;}
.add-item-btn{background:#0F6E56;color:#fff;border:none;border-radius:8px;padding:10px 14px;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;}
.fault-card{background:#f4f4f0;border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.fault-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;}
.fault-name{font-size:13px;font-weight:800;color:#1a3a2a;}
.fault-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.visibility-btn{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:4px 9px;border-radius:6px;border:none;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .2s;}
.visibility-btn.private{background:#f0f0ec;color:#999;}
.visibility-btn.shared{background:#eef8f2;color:#0F6E56;border:1px solid #a8d5b8;}
.fault-drills{display:flex;flex-wrap:wrap;gap:5px;}
.drill-chip-sm{font-size:11px;background:#fff;border:1px solid #ddd;border-radius:6px;padding:3px 9px;color:#555;}
.fault-add-select{width:100%;border:1.5px solid #ddd;border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit;background:#fafafa;-webkit-appearance:none;margin-bottom:10px;}
.fault-add-select:focus{outline:none;border-color:#0F6E56;}
.drill-select-area{display:none;margin-bottom:10px;}
.drill-select-label{font-size:11px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.drill-chips-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.drill-sel-chip{font-size:12px;padding:6px 12px;border-radius:8px;border:1.5px solid #ddd;background:#fff;color:#555;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;}
.drill-sel-chip.selected{background:#0F6E56;color:#fff;border-color:#0F6E56;}
.master-toggle{font-size:12px;font-weight:700;color:#0F6E56;background:none;border:none;cursor:pointer;padding:4px 0;display:block;margin-bottom:8px;}
.master-drill-list{display:none;max-height:180px;overflow-y:auto;border:1.5px solid #eee;border-radius:8px;background:#fff;}
.master-drill-list.open{display:block;}
.master-drill-item{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid #f0f0ec;cursor:pointer;}
.master-drill-item:last-child{border-bottom:none;}
.master-drill-item input[type=checkbox]{width:16px;height:16px;accent-color:#0F6E56;flex-shrink:0;}
.master-drill-item span{font-size:12px;color:#333;}
.fault-confirm-btn{width:100%;padding:11px;background:#1a3a2a;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:800;cursor:pointer;margin-top:4px;}
.new-lesson-btn{width:100%;padding:13px;background:#EF9F27;color:#1a3a2a;border:none;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-tap-highlight-color:transparent;transition:background .2s;}
.new-lesson-btn:hover{background:#d4881a;}
.lesson-form{background:#fff;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-top:4px solid #EF9F27;}
.lesson-form-title{font-size:14px;font-weight:900;color:#1a3a2a;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.lf-label{font-size:11px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;margin-top:12px;}
.lf-label:first-of-type{margin-top:0;}
.lf-date{width:100%;border:1.5px solid #ddd;border-radius:8px;padding:10px 12px;font-size:15px;font-family:inherit;background:#fafafa;-webkit-appearance:none;margin-bottom:2px;}
.lf-date:focus{outline:none;border-color:#0F6E56;background:#fff;}
.lf-textarea{width:100%;border:1.5px solid #ddd;border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit;background:#fafafa;resize:vertical;min-height:72px;-webkit-appearance:none;}
.lf-textarea:focus{outline:none;border-color:#0F6E56;background:#fff;}
.chip-group{margin-bottom:10px;}
.chip-group-title{font-size:11px;font-weight:800;color:#0F6E56;margin-bottom:6px;}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;}
.sel-chip{font-size:12px;padding:6px 12px;border-radius:8px;border:1.5px solid #ddd;background:#fff;color:#555;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;user-select:none;}
.sel-chip.on{background:#0F6E56;color:#fff;border-color:#0F6E56;}
.sel-chip.hw-on{background:#EF9F27;color:#1a3a2a;border-color:#EF9F27;}
.lf-save-row{display:flex;gap:8px;margin-top:14px;}
.lf-save-btn{flex:1;padding:12px;background:#0F6E56;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;}
.lf-cancel-btn{padding:12px 18px;background:#f0f0ec;color:#666;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;}
.lesson-entry{background:#fff;border-radius:12px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden;}
.lesson-entry-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;gap:10px;}
.lesson-entry-hdr:hover{background:#fafafa;}
.le-date{font-size:13px;font-weight:800;color:#1a3a2a;}
.le-summary{font-size:11px;color:#888;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-left:8px;}
.le-chev{font-size:12px;color:#aaa;transition:transform .2s;flex-shrink:0;}
.le-chev.open{transform:rotate(180deg);}
.lesson-entry-body{display:none;padding:0 16px 16px;border-top:1px solid #f0f0ec;}
.lesson-entry-body.open{display:block;}
.le-section-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#aaa;margin:12px 0 6px;}
.le-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px;}
.le-chip{font-size:11px;background:#eef8f2;border:1px solid #a8d5b8;border-radius:6px;padding:3px 9px;color:#0F6E56;}
.le-chip.hw{background:#fff8ee;border-color:#f0c97a;color:#9a6200;}
.le-text{font-size:13px;color:#444;line-height:1.6;background:#f4f4f0;border-radius:8px;padding:10px 12px;}
.hw-status-row{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}
.hw-status-btn{font-size:11px;font-weight:700;padding:5px 12px;border-radius:8px;border:1.5px solid #ddd;background:#fff;color:#888;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;}
.hw-status-btn.active-done{background:#eef8f2;border-color:#a8d5b8;color:#0F6E56;}
.hw-status-btn.active-partial{background:#fff8ee;border-color:#f0c97a;color:#9a6200;}
.hw-status-btn.active-not{background:#fdecea;border-color:#f0a8a0;color:#c0392b;}
.le-edit-btn{font-size:11px;font-weight:700;color:#0F6E56;background:none;border:none;cursor:pointer;padding:4px 0;margin-top:8px;display:inline-block;}
.le-del-btn{font-size:11px;font-weight:700;color:#ccc;background:none;border:none;cursor:pointer;padding:4px 8px;margin-top:8px;display:inline-block;float:right;}
.le-del-btn:hover{color:#e55;}
.no-lessons{text-align:center;padding:32px 16px;color:#aaa;font-size:13px;}
.new-plan-btn{width:100%;padding:13px;background:#1a3a2a;color:#EF9F27;border:none;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-tap-highlight-color:transparent;transition:background .2s;}
.new-plan-btn:hover{background:#0a2218;}
.plan-form{background:#fff;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-top:4px solid #1a3a2a;}
.plan-form-title{font-size:14px;font-weight:900;color:#1a3a2a;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.pf-label{font-size:11px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;margin-top:12px;}
.pf-label:first-of-type{margin-top:0;}
.pf-input{width:100%;border:1.5px solid #ddd;border-radius:8px;padding:10px 12px;font-size:15px;font-family:inherit;background:#fafafa;-webkit-appearance:none;transition:border .2s;}
.pf-input:focus{outline:none;border-color:#0F6E56;background:#fff;}
.pf-textarea{width:100%;border:1.5px solid #ddd;border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit;background:#fafafa;resize:vertical;min-height:68px;-webkit-appearance:none;}
.pf-textarea:focus{outline:none;border-color:#0F6E56;background:#fff;}
.goals-ref{background:#fffbf0;border-left:3px solid #EF9F27;border-radius:0 8px 8px 0;padding:10px 12px;margin-bottom:4px;font-size:12px;color:#666;line-height:1.6;}
.goals-ref strong{color:#1a3a2a;display:block;font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.pf-save-row{display:flex;gap:8px;margin-top:14px;}
.pf-save-btn{flex:1;padding:12px;background:#1a3a2a;color:#EF9F27;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;}
.pf-cancel-btn{padding:12px 18px;background:#f0f0ec;color:#666;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;}
.plan-section-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#888;margin:12px 0 8px;padding-bottom:4px;border-bottom:1px solid #eee;}
.plan-entry{background:#fff;border-radius:12px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden;}
.plan-entry.completed{opacity:.6;}
.plan-entry-hdr{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;}
.plan-entry-hdr:hover{background:#fafafa;}
.pe-status-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.pe-status-dot.upcoming{background:#EF9F27;}
.pe-status-dot.completed{background:#a8d5b8;}
.pe-status-dot.past{background:#ddd;}
.pe-date{font-size:13px;font-weight:800;color:#1a3a2a;white-space:nowrap;}
.pe-time{font-size:11px;color:#888;white-space:nowrap;}
.pe-summary{font-size:11px;color:#888;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pe-chev{font-size:12px;color:#aaa;transition:transform .2s;flex-shrink:0;}
.pe-chev.open{transform:rotate(180deg);}
.plan-entry-body{display:none;padding:0 16px 16px;border-top:1px solid #f0f0ec;}
.plan-entry-body.open{display:block;}
.pe-field-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#aaa;margin:10px 0 4px;}
.pe-field-val{font-size:13px;color:#444;line-height:1.6;background:#f4f4f0;border-radius:8px;padding:9px 12px;}
.plan-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
.convert-btn{flex:1;padding:10px;background:#0F6E56;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;}
.convert-btn:hover{background:#1a3a2a;}
.pe-edit-btn{font-size:11px;font-weight:700;color:#0F6E56;background:none;border:none;cursor:pointer;padding:4px 0;}
.pe-del-btn{font-size:11px;font-weight:700;color:#ccc;background:none;border:none;cursor:pointer;padding:4px 8px;margin-left:auto;}
.pe-del-btn:hover{color:#e55;}
.completed-badge{font-size:10px;font-weight:700;background:#eef8f2;color:#0F6E56;border:1px solid #a8d5b8;border-radius:6px;padding:3px 8px;white-space:nowrap;}
.no-plans{text-align:center;padding:32px 16px;color:#aaa;font-size:13px;}
.planner-student-sel{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.planner-student-sel label{font-size:11px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px;}
.planner-sel-input{width:100%;border:2px solid #0F6E56;border-radius:8px;padding:10px 12px;font-size:15px;font-family:inherit;background:#fafafa;-webkit-appearance:none;}
.planner-sel-input:focus{outline:none;border-color:#1a3a2a;background:#fff;}
.dl-view-tabs{display:flex;gap:0;border-radius:10px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.08);margin-bottom:14px;}
.dl-view-tab{flex:1;padding:11px 8px;font-size:12px;font-weight:800;border:none;cursor:pointer;transition:all .2s;text-align:center;-webkit-tap-highlight-color:transparent;}
.dl-view-tab.active{background:#1a3a2a;color:#EF9F27;}
.dl-view-tab:not(.active){background:#f0f0ec;color:#888;}
.dl-search{width:100%;border:2px solid #0F6E56;border-radius:10px;padding:11px 14px;font-size:15px;font-family:inherit;background:#fff;margin-bottom:10px;-webkit-appearance:none;transition:border .2s;}
.dl-search:focus{outline:none;border-color:#1a3a2a;}
.cat-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.cat-btn{padding:7px 14px;font-size:12px;font-weight:700;border-radius:20px;border:2px solid #ddd;background:#fff;color:#666;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;}
.cat-btn.active{background:#0F6E56;color:#fff;border-color:#0F6E56;}
.dl-count{font-size:11px;color:#888;margin-bottom:10px;}
.drill-card{background:#fff;border-radius:12px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden;}
.drill-card-hdr{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.drill-card-hdr:hover{background:#fafafa;}
.drill-cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.drill-card-name{flex:1;font-size:13px;font-weight:800;color:#1a3a2a;}
.drill-card-cat{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;flex-shrink:0;}
.drill-card-chev{font-size:12px;color:#aaa;transition:transform .2s;flex-shrink:0;}
.drill-card-chev.open{transform:rotate(180deg);}
.drill-card-body{display:none;padding:0 16px 14px;border-top:1px solid #f0f0ec;}
.drill-card-body.open{display:block;}
.drill-body-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#aaa;margin:10px 0 5px;}
.drill-notes-text{font-size:13px;color:#444;line-height:1.6;background:#f4f4f0;border-radius:8px;padding:9px 12px;}
.drill-faults-wrap{display:flex;flex-wrap:wrap;gap:5px;}
.drill-fault-tag{font-size:11px;background:#fff3e0;border:1px solid #f0c97a;border-radius:6px;padding:3px 9px;color:#9a6200;}
.drill-actions{display:flex;gap:8px;margin-top:10px;align-items:center;}

<script>
const SURL='https://dejmkfbzbqtvqgxtwipv.supabase.co';
const SKEY='sb_publishable_zLIVnPYNxlyyAsYrkq9LJg_ztRZaJFp';
const sb=supabase.createClient(SURL,SKEY);

var students=[],profileData={},lessonData=[],plannerData=[],benchData={};
var currentStudentId=null,autoSaveTimer=null,editingLessonId=null,editingPlanId=null;
var drillLibrary=[],activeDrillCat='All',drillView='master',editingDrillId=null;
var benchStudentId=null,activeScorecardTest=null;

// ── BENCH TESTS CONFIG ──
const BANDS=[{min:1,max:2,label:'Beginning',cls:'band-1'},{min:3,max:4,label:'Progressing',cls:'band-3'},{min:5,max:6,label:'Developing',cls:'band-5'},{min:7,max:8,label:'Performing',cls:'band-7'},{min:9,max:10,label:'Elite',cls:'band-9'}];
function getBand(lv){if(!lv||lv<1)return null;return BANDS.find(function(b){return lv>=b.min&&lv<=b.max;})||null;}
const BAND_COLORS=['#c0392b','#c0392b','#856404','#856404','#0F6E56','#0F6E56','#1a4a7a','#1a4a7a','#6b2fa0','#6b2fa0'];
const BAND_FILLS=['#fde8e8','#fde8e8','#fef3cd','#fef3cd','#eef8f2','#eef8f2','#d0e4f7','#d0e4f7','#ead5f5','#ead5f5'];

const BENCH_TESTS=[
  {key:'long_drive',label:'Long Drive',unit:'Points + Distance (m)',gendered:true,dual:true,f1:'Points',f2:'Metres',
   thresholds:{M:[{pts:1,dist:30},{pts:1,dist:50},{pts:1,dist:80},{pts:1,dist:120},{pts:2,dist:150},{pts:2,dist:180},{pts:2,dist:210},{pts:3,dist:230},{pts:3,dist:250},{pts:3,dist:270}],F:[{pts:1,dist:25},{pts:1,dist:40},{pts:1,dist:60},{pts:1,dist:90},{pts:2,dist:120},{pts:2,dist:150},{pts:2,dist:180},{pts:3,dist:210},{pts:3,dist:230},{pts:3,dist:250}]},
   scoreType:'dual_drive',
   desc:'Set up a fairway 40m wide and hit 5 drives. Only fairway drives count. Record the number of fairway drives (points) and distance of your longest fairway drive. Level is calculated automatically.'},
  {key:'chs',label:'Club Head Speed',unit:'mph (driver)',gendered:true,dual:false,
   thresholds:{M:[50,60,70,80,90,100,110,115,120,125],F:[40,50,60,70,80,90,95,100,105,110]},
   scoreType:'chs',hasDevice:true,
   desc:'Measured with driver. Enter club head speed in mph. Uses gendered benchmarks.'},
  {key:'aussie_rules',label:'Aussie Rules',unit:'Points + Distance (m)',gendered:true,dual:true,f1:'Points',f2:'Metres',
   thresholds:{M:[{pts:1,dist:20},{pts:1,dist:40},{pts:2,dist:60},{pts:2,dist:80},{pts:4,dist:100},{pts:4,dist:120},{pts:5,dist:140},{pts:6,dist:150},{pts:6,dist:160},{pts:7,dist:170}],F:[{pts:1,dist:20},{pts:1,dist:30},{pts:2,dist:50},{pts:2,dist:70},{pts:4,dist:85},{pts:4,dist:105},{pts:5,dist:120},{pts:6,dist:130},{pts:6,dist:140},{pts:7,dist:150}]},
   scoreType:'dual_drive',
   desc:'Set up an inner goal 12m wide with outer posts 4m either side. Hit 5 shots with a 7 iron. Score 2pts inside inner goal, 1pt outer posts. Record total points and distance. Level calculated automatically.'},
  {key:'short_game',label:'Junior Short Game Circuit',unit:'Total points (lower = better)',dual:false,inverse:true,scoreType:'scorecard',
   desc:'9-hole short game circuit. Scoring: Holed=4pts, 0–3ft=3pts, 3–6ft=2pts, 6–12ft=1pt, 12ft+=0pts.'},
  {key:'putting',label:'Junior Putting Circuit',unit:'Total putts (lower = better)',dual:false,inverse:true,scoreType:'scorecard',
   desc:'9 putts from: 3, 4, 5, 6, 8, 12, 15, 20 and 30ft. Putt each ball out until holed. Count total putts. Lower is better.'},
  {key:'wedge',label:'Wedge Combine',unit:'Total distance from hole (ft) — lower better',dual:false,inverse:true,
   thresholds:[250,200,160,140,120,100,80,60,40,25],scoreType:'linear',
   desc:'Hit 5 shots — one each from 30, 40, 50, 60 and 70m. Record total distance of all 5 balls from the hole in feet. Lower is better.'},
  {key:'par72',label:'Par 72 Scoring Challenge',unit:'Total points (lower = better)',dual:false,inverse:true,scoreType:'scorecard',
   desc:'8-hole scoring challenge. Lower score is better.'},
];

// ── LEVEL CALCULATION ──
function calcLevel(test,v1,v2,gender){
  var g=gender||'M';
  if(test.scoreType==='chs'){
    var s=parseFloat(v1);if(isNaN(s))return null;
    var t=test.thresholds[g];var lv=0;
    for(var i=0;i<t.length;i++){if(s>=t[i])lv=i+1;}return lv||null;
  }
  if(test.scoreType==='linear'){
    var s=parseFloat(v1);if(isNaN(s))return null;
    var t=test.thresholds;
    if(test.inverse){for(var i=t.length-1;i>=0;i--){if(s<=t[i])return i+1;}return 1;}
    else{var lv=0;for(var i=0;i<t.length;i++){if(s>=t[i])lv=i+1;}return lv||null;}
  }
  if(test.scoreType==='dual_drive'){
    var pts=parseFloat(v1),dist=parseFloat(v2);if(isNaN(pts)||isNaN(dist))return null;
    var t=test.thresholds[g];var lv=0;
    for(var i=0;i<t.length;i++){if(pts>=t[i].pts&&dist>=t[i].dist)lv=i+1;}return lv||null;
  }
  if(test.scoreType==='scorecard'){
    return calcScorecardLevel(test.key,parseFloat(v1));
  }
  return null;
}

function calcScorecardLevel(key,total){
  if(isNaN(total))return null;
  if(key==='short_game'){
    // Lower is better — 9 holes, max 36pts
    if(total<=4)return 10;if(total<=6)return 9;if(total<=8)return 8;if(total<=10)return 7;
    if(total<=13)return 6;if(total<=16)return 5;if(total<=20)return 4;if(total<=24)return 3;
    if(total<=28)return 2;return 1;
  }
  if(key==='putting'){
    // 9 putts, lower is better
    if(total<=12)return 10;if(total<=13)return 9;if(total<=14)return 8;if(total<=15)return 7;
    if(total<=16)return 6;if(total<=17)return 5;if(total<=18)return 4;if(total<=19)return 3;
    if(total<=21)return 2;return 1;
  }
  if(key==='par72'){
    if(total<=40)return 10;if(total<=48)return 9;if(total<=56)return 8;if(total<=64)return 7;
    if(total<=72)return 6;if(total<=80)return 5;if(total<=90)return 4;if(total<=100)return 3;
    if(total<=110)return 2;return 1;
  }
  return null;
}

// ── SCORECARD DATA ──
const SHORT_GAME_HOLES=[
  {hole:1,desc:'Fringe shot <10m',balls:1},{hole:2,desc:'Fringe shot 10–20m',balls:1},
  {hole:3,desc:'Chip & run 10m',balls:1},{hole:4,desc:'Chip & run 10–20m',balls:1},
  {hole:5,desc:'Pitch 20m',balls:1},{hole:6,desc:'Pitch 30m',balls:1},
  {hole:7,desc:'Lob 10m',balls:1},{hole:8,desc:'Bunker 10m',balls:1},{hole:9,desc:'Bunker 20m',balls:1}
];
const PUTTING_HOLES=[

// ── TABS ──
function showTab(id,el){
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.getElementById(id).classList.add('active');

// ── DB ──
async function dbGet(k){try{var r=await sb.from('jdp_data').select('value').eq('key',k).limit(1).maybeSingle();if(r.error||!r.data)return null;return JSON.parse(r.data.value);}catch(e){return null;}}
async function dbSet(k,v){try{await sb.from('jdp_data').upsert({key:k,value:JSON.stringify(v)},{onConflict:'key'});showSynced();}catch(e){showSyncError();}}
function showSynced(){document.getElementById('sync-dot').className='sync-dot';document.getElementById('sync-msg').textContent='Saved';setTimeout(function(){document.getElementById('sync-msg').textContent='Live';},2000);}
function showSyncError(){document.getElementById('sync-dot').className='sync-dot off';document.getElementById('sync-msg').textContent='Sync error';}

// ── UTILS ──
function sortByLastName(arr){return arr.slice().sort(function(a,b){var an=(a.name||'').trim().split(' '),bn=(b.name||'').trim().split(' ');var al=an.length>1?an[an.length-1]:an[0],bl=bn.length>1?bn[bn.length-1]:bn[0];return al.toLowerCase()<bl.toLowerCase()?-1:al.toLowerCase()>bl.toLowerCase()?1:0;});}
function initials(n){var p=(n||'').trim().split(' ').filter(Boolean);if(!p.length)return'?';if(p.length===1)return p[0][0].toUpperCase();return(p[0][0]+p[p.length-1][0]).toUpperCase();}
function escHtml(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escAttr(s){return(s||'').replace(/"/g,'&quot;');}
function today(){return new Date().toISOString().slice(0,10);}
function fmtDate(d){if(!d)return'';var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function profileKey(id){return'hub_student_'+id;}
function lessonsKey(id){return'hub_lessons_'+id;}
function plannerKey(id){return'hub_plans_'+id;}
function benchKey(id){return'hub_benchmarks_'+id;}
function isPast(d){return d&&d<today();}
function scheduleAutoSave(){clearTimeout(autoSaveTimer);setAutoSaveInd('Saving…');autoSaveTimer=setTimeout(async function(){if(!currentStudentId)return;await dbSet(profileKey(currentStudentId),profileData);setAutoSaveInd('Saved ✓');setTimeout(function(){setAutoSaveInd('');},2000);},800);}
function setAutoSaveInd(msg){var el=document.getElementById('autosave-ind');if(el)el.textContent=msg;}

// ── STUDENT LIST ──
function renderList(){
  var search=(document.getElementById('search').value||'').toLowerCase().trim();
  var filtered=sortByLastName(students).filter(function(s){return !search||s.name.toLowerCase().includes(search)||(s.club||'').toLowerCase().includes(search);});
  document.getElementById('student-count').textContent=filtered.length+' student'+(filtered.length!==1?'s':'');
  var listEl=document.getElementById('student-list');
  if(!filtered.length){listEl.innerHTML='<div class="empty-state"><div class="empty-icon">'+(students.length?'🔍':'🏌️')+'</div><p>'+(students.length?'No match.':'No students yet.<br>Tap <strong>Add Student</strong> to get started.')+'</p></div>';return;}
  listEl.innerHTML='';
  filtered.forEach(function(s){
    var card=document.createElement('div');card.className='student-card';
    card.innerHTML='<div class="student-avatar">'+initials(s.name)+'</div><div class="student-info"><div class="student-name">'+s.name+'</div>'+(s.club?'<div class="student-club">'+s.club+(s.gender?' · '+(s.gender==='F'?'Female':'Male'):'')+'</div>':'<div class="student-club" style="color:#ccc;">No club set</div>')+'</div><span class="student-arrow">›</span><span class="student-del" title="Remove">✕</span>';
    card.querySelector('.student-del').onclick=function(e){e.stopPropagation();deleteStudent(s.id);};
    card.querySelector('.student-info').onclick=function(){openProfile(s.id);};
    card.querySelector('.student-avatar').onclick=function(){openProfile(s.id);};
    card.querySelector('.student-arrow').onclick=function(){openProfile(s.id);};
    listEl.appendChild(card);
  });
}
function openAddSheet(){document.getElementById('s-name').value='';document.getElementById('s-club').value='';document.getElementById('s-gender').value='M';document.getElementById('add-overlay').classList.add('open');setTimeout(function(){document.getElementById('s-name').focus();},200);}
function closeAddSheet(){document.getElementById('add-overlay').classList.remove('open');}
function overlayClick(e){if(e.target===document.getElementById('add-overlay'))closeAddSheet();}
async function saveStudent(){
  var name=document.getElementById('s-name').value.trim();if(!name){alert('Please enter a name.');return;}
  students.push({id:Date.now(),name:name,club:document.getElementById('s-club').value.trim(),gender:document.getElementById('s-gender').value});
  await dbSet('hub_students',students);closeAddSheet();renderList();populatePlannerStudentSelect();populateBenchStudentSelect();
}
async function deleteStudent(id){var s=students.find(function(x){return String(x.id)===String(id);});if(!s)return;if(!confirm('Remove '+s.name+'?'))return;students=students.filter(function(x){return String(x.id)!==String(id);});await dbSet('hub_students',students);renderList();populatePlannerStudentSelect();populateBenchStudentSelect();}

// ── PROFILE ──
async function openProfile(id){
  currentStudentId=id;editingLessonId=null;
  var s=students.find(function(x){return String(x.id)===String(id);});if(!s)return;
  var saved=await dbGet(profileKey(id));
  profileData=saved||{goals:[],faults:[],focusAreas:[]};
  if(!profileData.goals)profileData.goals=[];if(!profileData.faults)profileData.faults=[];if(!profileData.focusAreas)profileData.focusAreas=[];
  lessonData=await dbGet(lessonsKey(id))||[];
  plannerData=await dbGet(plannerKey(id))||[];
  renderProfileView(s);
  document.getElementById('students-list-view').style.display='none';
  document.getElementById('students-profile-view').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}
function closeProfile(){currentStudentId=null;document.getElementById('students-profile-view').style.display='none';document.getElementById('students-list-view').style.display='block';}
function renderProfileView(s){
  var el=document.getElementById('profile-view-content');
  el.innerHTML='<div class="profile-hdr"><div class="profile-av">'+initials(s.name)+'</div><div class="profile-hdr-info"><div class="profile-hdr-name">'+s.name+'</div><div class="profile-hdr-club">'+(s.club||'No club set')+(s.gender?' · '+(s.gender==='F'?'Female':'Male'):'')+'</div><div class="autosave-ind" id="autosave-ind"></div></div></div>'+buildGoalsSection()+buildFaultsSection()+buildFocusSection()+'<div id="lesson-log-section">'+buildLessonLogSection()+'</div><div id="planner-profile-section">'+buildPlannerProfileSection()+'</div>';
}

// ── FAULTS ──
function buildFaultsSection(){var faultCards=(profileData.faults||[]).map(function(f,i){return buildFaultCard(f,i);}).join('');var faultOptions=Object.keys(FAULT_DRILLS).map(function(k){return'<option value="'+k+'">'+k+'</option>';}).join('');return'<div class="section-card"><div class="section-hdr" onclick="toggleSection(\'faults-body\',\'faults-chev\')"><div class="section-title">⚠️ Swing Faults</div><span class="section-chev open" id="faults-chev">▼</span></div><div class="section-body open" id="faults-body"><div id="fault-cards">'+faultCards+'</div><select class="fault-add-select" id="fault-select" onchange="faultSelected()"><option value="">— Select a fault to add —</option>'+faultOptions+'</select><div class="drill-select-area" id="drill-select-area"><div class="drill-select-label">Select prescribed drills for this fault:</div><div class="drill-chips-wrap" id="prescribed-chips"></div><button class="master-toggle" onclick="toggleMasterList()">+ Add from master drill list</button><div class="master-drill-list" id="master-drill-list"></div><button class="fault-confirm-btn" onclick="confirmFault()">✓ Add Fault & Drills</button></div></div></div>';}
function buildFaultCard(f,i){var drillChips=(f.drills||[]).map(function(d){return'<span class="drill-chip-sm">'+escHtml(d)+'</span>';}).join('');var visClass=f.shared?'shared':'private',visLabel=f.shared?'👁 Shared':'🔒 Private';return'<div class="fault-card" id="fault-card-'+i+'"><div class="fault-card-top"><div class="fault-name">'+escHtml(f.fault)+'</div><div class="fault-actions"><button class="visibility-btn '+visClass+'" onclick="toggleFaultVisibility('+i+')" id="vis-btn-'+i+'">'+visLabel+'</button><button class="item-del" onclick="removeFault('+i+')">✕</button></div></div>'+(drillChips?'<div class="fault-drills">'+drillChips+'</div>':'<div style="font-size:11px;color:#bbb;">No drills assigned</div>')+'</div>';}
function faultSelected(){var fault=document.getElementById('fault-select').value;var area=document.getElementById('drill-select-area');if(!fault){area.style.display='none';return;}area.style.display='block';var prescribed=FAULT_DRILLS[fault]||[];document.getElementById('prescribed-chips').innerHTML=prescribed.map(function(d){return'<div class="drill-sel-chip" onclick="toggleDrillChip(this)">'+escHtml(d)+'</div>';}).join('');var allNames=drillLibrary.length?drillLibrary.map(function(d){return d.name;}).sort():Object.values(FAULT_DRILLS).flat().filter(function(v,i,a){return a.indexOf(v)===i;}).sort();var masterEl=document.getElementById('master-drill-list');masterEl.classList.remove('open');masterEl.innerHTML=allNames.filter(function(d){return prescribed.indexOf(d)<0;}).map(function(d){return'<label class="master-drill-item"><input type="checkbox" value="'+escAttr(d)+'"><span>'+escHtml(d)+'</span></label>';}).join('');}
function toggleDrillChip(el){el.classList.toggle('selected');}
function toggleMasterList(){document.getElementById('master-drill-list').classList.toggle('open');}
function confirmFault(){var fault=document.getElementById('fault-select').value;if(!fault)return;var drills=[];document.querySelectorAll('#prescribed-chips .drill-sel-chip.selected').forEach(function(c){drills.push(c.textContent);});document.querySelectorAll('#master-drill-list input[type=checkbox]:checked').forEach(function(c){drills.push(c.value);});profileData.faults.push({fault:fault,drills:drills,shared:false});document.getElementById('fault-select').value='';document.getElementById('drill-select-area').style.display='none';document.getElementById('master-drill-list').classList.remove('open');refreshFaultCards();scheduleAutoSave();}
function removeFault(i){if(!confirm('Remove this fault?'))return;profileData.faults.splice(i,1);refreshFaultCards();scheduleAutoSave();}
function toggleFaultVisibility(i){profileData.faults[i].shared=!profileData.faults[i].shared;var btn=document.getElementById('vis-btn-'+i);if(btn){btn.className='visibility-btn '+(profileData.faults[i].shared?'shared':'private');btn.textContent=profileData.faults[i].shared?'👁 Shared':'🔒 Private';}scheduleAutoSave();}
function refreshFaultCards(){var el=document.getElementById('fault-cards');if(!el)return;el.innerHTML=(profileData.faults||[]).map(function(f,i){return buildFaultCard(f,i);}).join('');}

function buildLessonLogSection(){var entries=lessonData.slice().sort(function(a,b){return b.date<a.date?-1:b.date>a.date?1:0;});var entriesHtml=entries.length?entries.map(function(e,i){return buildLessonEntry(e,i===0);}).join(''):'<div class="no-lessons">No lessons logged yet.</div>';return'<div class="section-card"><div class="section-hdr" onclick="toggleSection(\'lesson-body\',\'lesson-chev\')"><div class="section-title">📝 Lesson Log</div><span class="section-chev open" id="lesson-chev">▼</span></div><div class="section-body open" id="lesson-body"><button class="new-lesson-btn" onclick="showLessonForm(null)">➕ New Lesson</button><div id="lesson-form-wrap"></div><div id="lesson-entries">'+entriesHtml+'</div></div></div>';}
function buildLessonEntry(e,startOpen){var notesChips=(e.notes||[]).map(function(n){return'<span class="le-chip">'+escHtml(n)+'</span>';}).join('');var hwChips=(e.homework||[]).map(function(h){return'<span class="le-chip hw">'+escHtml(h)+'</span>';}).join('');var hwStatus=e.hwStatus||'';var statusBtns=['Done','Partial','Not done'].map(function(s){var cls='hw-status-btn'+(hwStatus===s?' active-'+(s==='Done'?'done':s==='Partial'?'partial':'not'):'');return'<button class="'+cls+'" onclick="setHwStatus(\''+e.id+'\',\''+s+'\')">'+s+'</button>';}).join('');var summary=[];if(e.notes&&e.notes.length)summary.push(e.notes[0]);if(e.freeText)summary.push(e.freeText.slice(0,40)+(e.freeText.length>40?'…':''));return'<div class="lesson-entry" id="le-'+e.id+'"><div class="lesson-entry-hdr" onclick="toggleLeEntry(\''+e.id+'\')"><span class="le-date">'+fmtDate(e.date)+'</span><span class="le-summary">'+escHtml(summary.join(' · ')||'No notes')+'</span><span class="le-chev'+(startOpen?' open':'')+'" id="le-chev-'+e.id+'">▼</span></div><div class="lesson-entry-body'+(startOpen?' open':'')+'" id="le-body-'+e.id+'">'+(notesChips?'<div class="le-section-label">Session Notes</div><div class="le-chips">'+notesChips+'</div>':'')+(e.freeText?'<div class="le-section-label">Notes</div><div class="le-text">'+escHtml(e.freeText)+'</div>':'')+((hwChips||e.hwFreeText)?'<div class="le-section-label">Homework Set</div>'+(hwChips?'<div class="le-chips">'+hwChips+'</div>':'')+(e.hwFreeText?'<div class="le-text" style="margin-top:4px;">'+escHtml(e.hwFreeText)+'</div>':'')+'<div class="le-section-label">Homework Follow-Up</div><div class="hw-status-row">'+statusBtns+'</div>':'')+'<div style="display:flex;justify-content:space-between;align-items:center;"><button class="le-edit-btn" onclick="showLessonForm(\''+e.id+'\')">✏️ Edit</button><button class="le-del-btn" onclick="deleteLesson(\''+e.id+'\')">✕ Delete</button></div></div></div>';}
function toggleLeEntry(id){var body=document.getElementById('le-body-'+id),chev=document.getElementById('le-chev-'+id);if(!body)return;var open=body.classList.toggle('open');if(chev)chev.classList.toggle('open',open);}

function buildPlannerProfileSection(){var sorted=plannerData.slice().sort(function(a,b){return a.date<b.date?-1:a.date>b.date?1:0;});var upcoming=sorted.filter(function(p){return !p.completed&&!isPast(p.date);});var past=sorted.filter(function(p){return p.completed||isPast(p.date);});var upcomingHtml=upcoming.length?upcoming.map(function(p){return buildPlanEntry(p);}).join(''):'<div class="no-plans">No upcoming sessions planned.</div>';return'<div class="section-card"><div class="section-hdr" onclick="toggleSection(\'planner-profile-body\',\'planner-profile-chev\')"><div class="section-title">🗓 Planner</div><span class="section-chev open" id="planner-profile-chev">▼</span></div><div class="section-body open" id="planner-profile-body"><button class="new-plan-btn" onclick="showPlanForm(null)">➕ Plan a Session</button><div id="plan-form-wrap"></div>'+upcomingHtml+(past.length?'<div class="plan-section-label">Past / Completed</div>'+past.map(function(p){return buildPlanEntry(p);}).join(''):'')+'</div></div>';}
function buildPlanEntry(p){var isCompleted=p.completed;var dotCls=isCompleted?'completed':isPast(p.date)?'past':'upcoming';var summary=p.focus?(p.focus.slice(0,50)+(p.focus.length>50?'…':'')):'No focus set';return'<div class="plan-entry'+(isCompleted?' completed':'')+'" id="pe-'+p.id+'"><div class="plan-entry-hdr" onclick="togglePlanEntry(\''+p.id+'\')"><span class="pe-status-dot '+dotCls+'"></span><span class="pe-date">'+fmtDate(p.date)+'</span>'+(p.time?'<span class="pe-time">'+escHtml(p.time)+'</span>':'')+'<span class="pe-summary">'+escHtml(summary)+'</span>'+(isCompleted?'<span class="completed-badge">✓ Done</span>':'')+'<span class="pe-chev" id="pe-chev-'+p.id+'">▼</span></div><div class="plan-entry-body" id="pe-body-'+p.id+'">'+(p.focus?'<div class="pe-field-label">Focus Areas</div><div class="pe-field-val">'+escHtml(p.focus)+'</div>':'')+(p.drills?'<div class="pe-field-label">Drills / Activities</div><div class="pe-field-val">'+escHtml(p.drills)+'</div>':'')+(p.notes?'<div class="pe-field-label">Notes</div><div class="pe-field-val">'+escHtml(p.notes)+'</div>':'')+(profileData.goals&&profileData.goals.length?'<div class="pe-field-label">Goals</div><div class="goals-ref"><strong>For reference</strong>'+profileData.goals.map(function(g){return'<div>• '+escHtml(g)+'</div>';}).join('')+'</div>':'')+'<div class="plan-actions">'+(!isCompleted?'<button class="convert-btn" onclick="convertToLesson(\''+p.id+'\')">→ Convert to Lesson Log</button>':'')+'<button class="pe-edit-btn" onclick="showPlanForm(\''+p.id+'\')">✏️ Edit</button><button class="pe-del-btn" onclick="deletePlan(\''+p.id+'\')">✕ Delete</button></div></div></div>';}

function buildDrillCard(d){var color=CAT_COLORS[d.category]||'#0F6E56';var bg=CAT_BG[d.category]||'#eef8f2';var card=document.createElement('div');card.className='drill-card';card.id='dc-'+d.id;var faultTags=(d.faults||[]).map(function(f){return'<span class="drill-fault-tag">'+escHtml(f)+'</span>';}).join('');card.innerHTML='<div class="drill-card-hdr" onclick="toggleDrillCard('+d.id+')"><span class="drill-cat-dot" style="background:'+color+';"></span><span class="drill-card-name">'+escHtml(d.name)+'</span><span class="drill-card-cat" style="background:'+bg+';color:'+color+';">'+escHtml(d.category)+'</span>'+(d.videoUrl?'<span class="video-badge">▶ Video</span>':'')+'<span class="drill-card-chev" id="dcc-'+d.id+'">▼</span></div><div class="drill-card-body" id="dcb-'+d.id+'">'+(d.notes?'<div class="drill-body-label">Notes</div><div class="drill-notes-text">'+escHtml(d.notes)+'</div>':'')+(faultTags?'<div class="drill-body-label">Linked Faults</div><div class="drill-faults-wrap">'+faultTags+'</div>':'')+'<div class="drill-actions"><button class="drill-edit-btn" onclick="showDrillForm('+d.id+')">✏️ Edit</button><button class="drill-del-btn" onclick="deleteDrill('+d.id+')">✕ Delete</button></div></div>';return card;}
function toggleDrillCard(id){var body=document.getElementById('dcb-'+id),chev=document.getElementById('dcc-'+id);if(!body)return;var open=body.classList.toggle('open');if(chev)chev.classList.toggle('open',open);}
function renderFaultView(){var el=document.getElementById('dl-fault-list');if(!el)return;el.innerHTML='';Object.keys(FAULT_DRILLS).forEach(function(fault){var drillsForFault=drillLibrary.filter(function(d){return(d.faults||[]).indexOf(fault)>=0;});var card=document.createElement('div');card.className='fbf-card';var bodyId='fbf-body-'+fault.replace(/[^a-z0-9]/gi,'_');card.innerHTML='<div class="fbf-hdr" onclick="toggleFbf(\''+bodyId+'\',\'fbf-chev-'+fault.replace(/[^a-z0-9]/gi,'_')+'\')"><span class="fbf-title">'+escHtml(fault)+'</span><span class="fbf-count">'+drillsForFault.length+' drill'+(drillsForFault.length!==1?'s':'')+'</span><span class="fbf-chev" id="fbf-chev-'+fault.replace(/[^a-z0-9]/gi,'_')+'">▼</span></div><div class="fbf-body" id="'+bodyId+'">'+(drillsForFault.length?drillsForFault.map(function(d){return'<div class="fbf-drill-row"><span class="drill-cat-dot" style="background:'+(CAT_COLORS[d.category]||'#0F6E56')+';"></span><span class="fbf-drill-name">'+escHtml(d.name)+'</span><span style="font-size:10px;color:#aaa;">'+escHtml(d.category)+'</span></div>';}).join(''):'<p style="font-size:11px;color:#aaa;padding:4px 0;">No drills linked.</p>')+'</div>';el.appendChild(card);});}
function toggleFbf(bodyId,chevId){var body=document.getElementById(bodyId),chev=document.getElementById(chevId);if(!body)return;var open=body.classList.toggle('open');if(chev)chev.classList.toggle('open',open);}
function showDrillForm(editId){editingDrillId=editId;var existing=editId?drillLibrary.find(function(d){return d.id===editId;}):null;var catOptions=CATS.map(function(c){return'<option value="'+c+'"'+(existing&&existing.category===c?' selected':'')+'>'+c+'</option>';}).join('');var faultOptions=Object.keys(FAULT_DRILLS).map(function(f){var checked=existing&&(existing.faults||[]).indexOf(f)>=0;return'<label class="master-drill-item"><input type="checkbox" value="'+escAttr(f)+'"'+(checked?' checked':'')+'><span>'+escHtml(f)+'</span></label>';}).join('');var formHtml='<div class="drill-form"><div style="font-size:14px;font-weight:900;color:#1a3a2a;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;">'+(editId?'✏️ Edit Drill':'➕ New Drill')+'<button onclick="cancelDrillForm()" style="background:none;border:none;font-size:18px;color:#aaa;cursor:pointer;line-height:1;">✕</button></div><div class="df-label">Drill Name</div><input type="text" class="df-input" id="df-name" placeholder="Drill name" value="'+(existing?escAttr(existing.name||''):'')+'"><div class="df-label">Category</div><select class="df-input" id="df-cat">'+catOptions+'</select><div class="df-label">Notes</div><textarea class="df-textarea" id="df-notes" placeholder="Coaching notes…">'+(existing?escHtml(existing.notes||''):'')+'</textarea><div class="df-label">Video URL (future use)</div><input type="url" class="df-input" id="df-video" placeholder="https://youtube.com/…" value="'+(existing?escAttr(existing.videoUrl||''):'')+'"><div class="df-label">Link to Faults</div><div class="master-drill-list open" style="max-height:160px;">'+faultOptions+'</div><div class="df-save-row"><button class="df-cancel-btn" onclick="cancelDrillForm()">Cancel</button><button class="df-save-btn" onclick="saveDrill()">Save Drill</button></div></div>';var wrap=document.getElementById('drill-form-wrap');wrap.innerHTML=formHtml;wrap.scrollIntoView({behavior:'smooth',block:'start'});}
function cancelDrillForm(){editingDrillId=null;document.getElementById('drill-form-wrap').innerHTML='';}
async function saveDrill(){var name=document.getElementById('df-name').value.trim();if(!name){alert('Please enter a drill name.');return;}var cat=document.getElementById('df-cat').value;var notes=document.getElementById('df-notes').value.trim();var video=document.getElementById('df-video').value.trim();var faults=[];document.querySelectorAll('#drill-form-wrap input[type=checkbox]:checked').forEach(function(c){faults.push(c.value);});if(editingDrillId){var idx=drillLibrary.findIndex(function(d){return d.id===editingDrillId;});if(idx>=0)drillLibrary[idx]=Object.assign(drillLibrary[idx],{name:name,category:cat,notes:notes,videoUrl:video,faults:faults});}else{drillLibrary.push({id:Date.now(),name:name,category:cat,notes:notes,videoUrl:video,faults:faults});}await dbSet('hub_drills',drillLibrary);editingDrillId=null;document.getElementById('drill-form-wrap').innerHTML='';renderDrills();renderFaultView();}
async function deleteDrill(id){var d=drillLibrary.find(function(x){return x.id===id;});if(!d)return;if(!confirm('Delete "'+d.name+'"?'))return;drillLibrary=drillLibrary.filter(function(x){return x.id!==id;});await dbSet('hub_drills',drillLibrary);renderDrills();renderFaultView();}

function populateBenchStudentSelect(){var sel=document.getElementById('bench-student-select');if(!sel)return;var cur=sel.value;sel.innerHTML='<option value="">— Select a student —</option>';sortByLastName(students).forEach(function(s){var o=document.createElement('option');o.value=s.id;o.textContent=s.name+(s.club?' — '+s.club:'');if(String(s.id)===String(cur))o.selected=true;sel.appendChild(o);});}

async function loadBenchForStudent(){
  var id=document.getElementById('bench-student-select').value;
  var el=document.getElementById('bench-content');
  if(!id){el.innerHTML='';benchStudentId=null;return;}
  benchStudentId=id;
  var s=students.find(function(x){return String(x.id)===String(id);});
  benchData=await dbGet(benchKey(id))||{};
  var gender=s.gender||'M';

function buildBenchTestCard(test,gender){
  var logs=(benchData[test.key]||[]).slice().sort(function(a,b){return a.date<b.date?-1:a.date>b.date?1:0;});
  var latest=logs.length?logs[logs.length-1]:null;
  var first=logs.length>1?logs[0]:null;
  var lv=latest?latest.level:null;
  var band=lv?getBand(lv):null;
  var deltaHtml='';
  if(first&&latest&&first.level&&latest.level){var diff=latest.level-first.level;if(diff>0)deltaHtml='<span class="bench-delta up">▲ +'+diff+'</span>';else if(diff<0)deltaHtml='<span class="bench-delta down">▼ '+diff+'</span>';else deltaHtml='<span class="bench-delta flat">—</span>';}
  var levelBadge=lv?'<span class="bench-level-badge '+(band?band.cls:'')+'" >L'+lv+(band?' · '+band.label:'')+'</span>':'<span style="font-size:11px;color:#aaa;">No entries</span>';
  return'<div class="bench-test-card" id="btc-'+test.key+'">'+
    '<div class="bench-test-hdr" onclick="toggleBenchCard(\''+test.key+'\')">'+
    '<div class="bench-test-name">'+test.label+'<span class="bench-test-unit">'+test.unit+'</span></div>'+
    levelBadge+deltaHtml+
    '<span class="bench-test-chev" id="btchev-'+test.key+'">▼</span></div>'+
    '<div class="bench-test-body" id="btbody-'+test.key+'">'+
    '<div class="bench-desc">'+test.desc+'</div>'+
    buildBenchEntryArea(test,gender)+
    buildBenchLogList(test,gender)+
    '</div></div>';
}

function toggleBenchCard(key){var body=document.getElementById('btbody-'+key),chev=document.getElementById('btchev-'+key);if(!body)return;var open=body.classList.toggle('open');if(chev)chev.classList.toggle('open',open);}

function buildBenchEntryArea(test,gender){
  if(test.scoreType==='scorecard'){
    return'<button onclick="openScorecard(\''+test.key+'\')" style="width:100%;padding:11px;background:#EF9F27;color:#1a3a2a;border:none;border-radius:8px;font-size:13px;font-weight:800;cursor:pointer;margin-bottom:10px;">📋 Open Scorecard</button>'+
    '<div id="sc-wrap-'+test.key+'"></div>';
  }
  var fields='';
  if(test.dual){
    fields='<div class="bench-field"><label>'+test.f1+'</label><input type="number" id="bv1-'+test.key+'" placeholder="—" oninput="benchPreview(\''+test.key+'\',\''+gender+'\')"></div>'+
           '<div class="bench-field"><label>'+test.f2+'</label><input type="number" id="bv2-'+test.key+'" placeholder="—" oninput="benchPreview(\''+test.key+'\',\''+gender+'\')"></div>';
  }else{
    fields='<div class="bench-field" style="flex:2;"><label>Score</label><input type="number" id="bv1-'+test.key+'" placeholder="—" oninput="benchPreview(\''+test.key+'\',\''+gender+'\')"></div>';
  }
  if(test.hasDevice){
    fields+='<div class="bench-field"><label>Device</label><select id="bdev-'+test.key+'"><option>Flightscope</option><option>GC Quad</option><option>Trackman</option><option>Other</option></select></div>';
  }
  fields+='<div class="bench-field"><label>Date</label><input type="date" id="bdate-'+test.key+'" value="'+today()+'"></div>'+
          '<div style="align-self:flex-end;"><button class="bench-log-btn" onclick="logBenchEntry(\''+test.key+'\',\''+gender+'\')">+ Log</button></div>';
  return'<div class="bench-entry-row">'+fields+'</div>'+
         '<div class="bench-preview" id="bprev-'+test.key+'">Level will appear as you type</div>';
}

function benchPreview(key,gender){
  var test=BENCH_TESTS.find(function(t){return t.key===key;});if(!test)return;
  var v1El=document.getElementById('bv1-'+key),v2El=document.getElementById('bv2-'+key);
  var v1=v1El?v1El.value:'',v2=v2El?v2El.value:'';
  var prev=document.getElementById('bprev-'+key);if(!prev)return;
  if(!v1&&!v2){prev.textContent='Level will appear as you type';prev.style.color='#aaa';return;}
  var lv=calcLevel(test,v1,v2,gender);
  if(!lv){prev.textContent='Score entered — level will calculate when both fields are filled';prev.style.color='#aaa';return;}
  var band=getBand(lv);var color=BAND_COLORS[lv-1];
  prev.innerHTML='<span style="font-size:11px;color:#666;">Level: </span><span style="font-size:16px;font-weight:900;color:'+color+';">L'+lv+'</span>'+(band?'<span class="bench-level-badge '+band.cls+'" style="margin-left:6px;">'+band.label+'</span>':'');
}

async function logBenchEntry(key,gender){
  var test=BENCH_TESTS.find(function(t){return t.key===key;});if(!test)return;
  var v1El=document.getElementById('bv1-'+key),v2El=document.getElementById('bv2-'+key);
  var v1=v1El?v1El.value.trim():'',v2=v2El?v2El.value.trim():'';
  if(!v1&&!v2){alert('Please enter a score.');return;}
  var date=document.getElementById('bdate-'+key).value||today();
  var device=test.hasDevice&&document.getElementById('bdev-'+key)?document.getElementById('bdev-'+key).value:'';
  var lv=calcLevel(test,v1,v2,gender);
  var entry={id:Date.now(),date:date,v1:v1,v2:v2||'',device:device,level:lv};
  if(!benchData[key])benchData[key]=[];
  benchData[key].push(entry);
  await dbSet(benchKey(benchStudentId),benchData);
  if(v1El)v1El.value='';if(v2El)v2El.value='';
  document.getElementById('bdate-'+key).value=today();
  document.getElementById('bprev-'+key).textContent='Level will appear as you type';
  document.getElementById('bprev-'+key).style.color='#aaa';
  // refresh card
  var s=students.find(function(x){return String(x.id)===String(benchStudentId);});
  var card=document.getElementById('btc-'+key);
  if(card){var newCard=document.createElement('div');newCard.innerHTML=buildBenchTestCard(test,gender);card.replaceWith(newCard.firstChild);}
}

async function deleteBenchEntry(key,entryId,gender){
  if(!confirm('Delete this entry?'))return;
  if(!benchData[key])return;
  benchData[key]=benchData[key].filter(function(e){return e.id!==entryId;});
  await dbSet(benchKey(benchStudentId),benchData);
  var test=BENCH_TESTS.find(function(t){return t.key===key;});
  var card=document.getElementById('btc-'+key);
  if(card&&test){var newCard=document.createElement('div');newCard.innerHTML=buildBenchTestCard(test,gender);card.replaceWith(newCard.firstChild);}
}

function buildBenchLogList(test,gender){
  var logs=(benchData[test.key]||[]).slice().sort(function(a,b){return b.date<a.date?-1:b.date>a.date?1:0;});
  if(!logs.length)return'<p class="no-bench-entries">No entries yet.</p>';
  var rows=logs.slice(0,5).map(function(e){
    var band=e.level?getBand(e.level):null;
    var scoreDisplay=e.v2?e.v1+' / '+e.v2:e.v1;
    if(e.device)scoreDisplay+=' ('+e.device+')';
    return'<div class="bench-log-row">'+
      '<span class="bench-log-date">'+fmtDate(e.date)+'</span>'+
      '<span class="bench-log-score">'+scoreDisplay+'</span>'+
      (e.level?'<span class="bench-level-badge '+(band?band.cls:'')+'" style="font-size:10px;padding:2px 7px;">L'+e.level+'</span>':'<span style="font-size:10px;color:#aaa;">—</span>')+
      '<span class="bench-log-del" onclick="deleteBenchEntry(\''+test.key+'\','+e.id+',\''+gender+'\')">✕</span>'+
      '</div>';
  }).join('');
  var extra=logs.length>5?'<p style="font-size:10px;color:#aaa;padding:4px 2px;">+ '+(logs.length-5)+' earlier entries saved</p>':'';
  return'<div class="bench-log-list">'+rows+'</div>'+extra+buildBenchTrendChart(test);
}

function buildBenchTrendChart(test){
  var all=(benchData[test.key]||[]).slice().sort(function(a,b){return a.date<b.date?-1:a.date>b.date?1:0;});
  var pts=all.filter(function(e){return e.level&&e.level>=1;});
  if(pts.length<2)return'';
  var avgLv=Math.round(pts.reduce(function(s,e){return s+e.level;},0)/pts.length);
  var color=BAND_COLORS[Math.min(avgLv-1,9)];
  var fill=BAND_FILLS[Math.min(avgLv-1,9)];
  var W=280,H=80,padL=22,padR=8,padT=8,padB=22;
  var cW=W-padL-padR,cH=H-padT-padB;
  var n=pts.length;
  function xPos(i){return padL+i*(cW/(n-1));}
  function yPos(lv){return padT+cH-(((lv-1)/9)*cH);}
  var linePts=pts.map(function(e,i){return xPos(i)+','+yPos(e.level);}).join(' ');
  var areaPath='M'+xPos(0)+','+yPos(pts[0].level)+pts.map(function(e,i){return' L'+xPos(i)+','+yPos(e.level);}).join('')+' L'+xPos(n-1)+','+(padT+cH)+' L'+xPos(0)+','+(padT+cH)+' Z';
  var yLabels=[1,5,10].map(function(lv){return'<text x="'+(padL-3)+'" y="'+(yPos(lv)+4)+'" text-anchor="end" font-size="8" fill="#bbb">'+lv+'</text>';}).join('');
  var xLabels='<text x="'+xPos(0)+'" y="'+(H-5)+'" text-anchor="start" font-size="8" fill="#bbb">'+fmtDate(pts[0].date)+'</text>'+
    '<text x="'+xPos(n-1)+'" y="'+(H-5)+'" text-anchor="end" font-size="8" fill="#bbb">'+fmtDate(pts[n-1].date)+'</text>';
  var dots=pts.map(function(e,i){return'<circle cx="'+xPos(i)+'" cy="'+yPos(e.level)+'" r="3" fill="'+color+'" stroke="#fff" stroke-width="1.5"/>';}).join('');
  var svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;display:block;">'+
    '<path d="'+areaPath+'" fill="'+fill+'" opacity="0.5"/>'+
    '<polyline points="'+linePts+'" fill="none" stroke="'+color+'" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'+
    yLabels+xLabels+dots+
    '</svg>';
  return'<div style="margin-top:10px;background:#fafafa;border-radius:8px;padding:8px 10px;"><div style="font-size:10px;font-weight:800;color:#aaa;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;">Progress</div>'+svg+'</div>';
}

// ── SCORECARDS ──
function openScorecard(key){
  var wrap=document.getElementById('sc-wrap-'+key);if(!wrap)return;
  if(activeScorecardTest===key){activeScorecardTest=null;wrap.innerHTML='';return;}
  activeScorecardTest=key;
  if(key==='short_game')wrap.innerHTML=buildShortGameScorecard();
  else if(key==='putting')wrap.innerHTML=buildPuttingScorecard();
  else if(key==='par72')wrap.innerHTML=buildPar72Scorecard();
}

function buildShortGameScorecard(){
  var opts=[{v:4,l:'Holed — 4pts'},{v:3,l:'0–3ft — 3pts'},{v:2,l:'3–6ft — 2pts'},{v:1,l:'6–12ft — 1pt'},{v:0,l:'12ft+ — 0pts'}];
  var holes=SHORT_GAME_HOLES.map(function(h){
    var options=opts.map(function(o){return'<label class="sc-option" onclick="scSelect(this)"><input type="radio" name="sg-h'+h.hole+'" value="'+o.v+'"><span class="sc-option-label">'+o.l+'</span></label>';}).join('');
    return'<div class="sc-hole"><div class="sc-hole-title">Hole '+h.hole+' — '+h.desc+'</div><div class="sc-options">'+options+'</div></div>';
  }).join('');
  return'<div class="scorecard"><div class="scorecard-title">Short Game Circuit</div><div class="scorecard-subtitle">9 holes — lower score is better</div>'+holes+'<div class="sc-total-row"><span class="sc-total-label">Total Points</span><span class="sc-total-val" id="sg-total">—</span></div><div class="sc-level-preview" id="sg-preview"><span style="color:#aaa;font-size:12px;">Complete all holes to see level</span></div><button class="sc-save-btn" onclick="saveScorecard(\'short_game\')">Save Result</button><button class="sc-cancel-btn" onclick="closeScorecard(\'short_game\')">Cancel</button></div>';
}

function buildPuttingScorecard(){
  var holes=PUTTING_HOLES.map(function(h){
    var opts=[1,2,3,4,5].map(function(v){return'<label class="sc-option" onclick="scSelect(this)"><input type="radio" name="put-h'+h.hole+'" value="'+v+'"><span class="sc-option-label">'+v+' putt'+(v>1?'s':'')+'</span></label>';}).join('');
    return'<div class="sc-hole"><div class="sc-hole-title">Hole '+h.hole+' — '+h.desc+'</div><div class="sc-options">'+opts+'</div></div>';
  }).join('');
  return'<div class="scorecard"><div class="scorecard-title">Putting Circuit</div><div class="scorecard-subtitle">9 holes — count every putt until holed</div>'+holes+'<div class="sc-total-row"><span class="sc-total-label">Total Putts</span><span class="sc-total-val" id="put-total">—</span></div><div class="sc-level-preview" id="put-preview"><span style="color:#aaa;font-size:12px;">Complete all holes to see level</span></div><button class="sc-save-btn" onclick="saveScorecard(\'putting\')">Save Result</button><button class="sc-cancel-btn" onclick="closeScorecard(\'putting\')">Cancel</button></div>';
}

function buildPar72Scorecard(){
  var holes=PAR72_HOLES.map(function(h){
    var options=h.options.map(function(o){return'<label class="sc-option" onclick="scSelect(this)"><input type="radio" name="p72-h'+h.hole+'" value="'+o.value+'"><span class="sc-option-label">'+o.label+'</span></label>';}).join('');
    return'<div class="sc-hole"><div class="sc-hole-title">Hole '+h.hole+' — '+h.desc+'</div><div class="sc-balls">'+h.balls+' ball'+(h.balls>1?'s':'')+'</div><div class="sc-options">'+options+'</div></div>';
  }).join('');
  return'<div class="scorecard"><div class="scorecard-title">Par 72 Scoring Challenge</div><div class="scorecard-subtitle">8 holes — lower score is better</div>'+holes+'<div class="sc-total-row"><span class="sc-total-label">Total Points</span><span class="sc-total-val" id="p72-total">—</span></div><div class="sc-level-preview" id="p72-preview"><span style="color:#aaa;font-size:12px;">Complete all holes to see level</span></div><button class="sc-save-btn" onclick="saveScorecard(\'par72\')">Save Result</button><button class="sc-cancel-btn" onclick="closeScorecard(\'par72\')">Cancel</button></div>';
}

function scSelect(labelEl){
  // mark selected within its hole
  var group=labelEl.closest('.sc-options');
  if(group)group.querySelectorAll('.sc-option').forEach(function(o){o.classList.remove('selected');});
  labelEl.classList.add('selected');
  // recalculate total
  if(activeScorecardTest)updateScorecardTotal(activeScorecardTest);
}

function updateScorecardTotal(key){
  var prefix=key==='short_game'?'sg':key==='putting'?'put':'p72';
  var holes=key==='short_game'?9:key==='putting'?9:8;
  var total=0;var allFilled=true;
  for(var h=1;h<=holes;h++){
    var checked=document.querySelector('input[name="'+prefix.replace('sg','sg').replace('put','put').replace('p72','p72')+'-h'+h+'"]:checked')||
                document.querySelector('input[name="'+(key==='short_game'?'sg':key==='putting'?'put':'p72')+'-h'+h+'"]:checked');
    if(checked){total+=parseFloat(checked.value);}else{allFilled=false;}
  }
  var totalEl=document.getElementById(prefix+'-total');
  var prevEl=document.getElementById(prefix+'-preview');
  if(totalEl)totalEl.textContent=allFilled?total:'—';
  if(prevEl&&allFilled){
    var lv=calcScorecardLevel(key,total);
    if(lv){var band=getBand(lv);var color=BAND_COLORS[lv-1];prevEl.innerHTML='<span style="font-size:13px;color:#666;">Level: </span><span style="font-size:18px;font-weight:900;color:'+color+';">L'+lv+'</span>'+(band?'<span class="bench-level-badge '+band.cls+'" style="margin-left:6px;">'+band.label+'</span>':'');}
    else{prevEl.innerHTML='<span style="color:#aaa;font-size:12px;">Score: '+total+' — check thresholds</span>';}
  }
}

async function saveScorecard(key){
  var prefix=key==='short_game'?'sg':key==='putting'?'put':'p72';
  var holes=key==='short_game'?9:key==='putting'?9:8;
  var total=0;var allFilled=true;
  for(var h=1;h<=holes;h++){
    var checked=document.querySelector('input[name="'+prefix+'-h'+h+'"]:checked');
    if(checked){total+=parseFloat(checked.value);}else{allFilled=false;}
  }
  if(!allFilled){alert('Please complete all holes before saving.');return;}
  var lv=calcScorecardLevel(key,total);
  var entry={id:Date.now(),date:today(),v1:String(total),v2:'',device:'',level:lv};
  if(!benchData[key])benchData[key]=[];
  benchData[key].push(entry);
  await dbSet(benchKey(benchStudentId),benchData);
  activeScorecardTest=null;
  var s=students.find(function(x){return String(x.id)===String(benchStudentId);});
  var gender=s?s.gender||'M':'M';
  var test=BENCH_TESTS.find(function(t){return t.key===key;});
  var card=document.getElementById('btc-'+key);
  if(card&&test){var newCard=document.createElement('div');newCard.innerHTML=buildBenchTestCard(test,gender);card.replaceWith(newCard.firstChild);}
}

function closeScorecard(key){
  activeScorecardTest=null;
  var wrap=document.getElementById('sc-wrap-'+key);if(wrap)wrap.innerHTML='';
}

// ── SECTION TOGGLE ──
function toggleSection(bodyId,chevId){var body=document.getElementById(bodyId),chev=document.getElementById(chevId);if(!body)return;var open=body.classList.toggle('open');if(chev)chev.classList.toggle('open',open);}

// ── INIT ──
async function init(){
  try{
    await sb.from('jdp_data').select('key').limit(1);
    document.getElementById('sync-dot').className='sync-dot';document.getElementById('sync-msg').textContent='Live';
    students=await dbGet('hub_students')||[];
    renderList();populatePlannerStudentSelect();populateBenchStudentSelect();
    await loadDrillLibrary();
  }catch(e){document.getElementById('sync-dot').className='sync-dot off';document.getElementById('sync-msg').textContent='Error';console.error(e);}
  document.getElementById('loading').style.display='none';
}
init();
</script>
