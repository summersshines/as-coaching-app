<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AS Coaching</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f4f4f0;color:#222;font-size:13px;min-height:100vh;}
.gold-bar{height:4px;background:linear-gradient(90deg,#EF9F27,#f5c76e,#EF9F27);}
.hdr{background:#1a3a2a;padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.hdr-brand{color:#EF9F27;font-family:Georgia,serif;font-size:1.3rem;font-weight:bold;letter-spacing:1px;flex:1;}
.hdr-brand span{color:#a8c4b0;font-size:.75rem;font-weight:normal;display:block;letter-spacing:.5px;margin-top:1px;}
.sync-wrap{display:flex;align-items:center;gap:5px;font-size:10px;color:#a8c4b0;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#4caf50;flex-shrink:0;}
.sync-dot.off{background:#ff5252;}
.tabs{background:#0F6E56;display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;position:sticky;top:56px;z-index:99;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:12px 16px;font-size:12px;font-weight:700;color:rgba(255,255,255,.55);cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;transition:all .2s;-webkit-tap-highlight-color:transparent;}
.tab.active{color:#EF9F27;border-bottom-color:#EF9F27;}
.tab:hover:not(.active){color:#fff;}
.content{padding:16px;max-width:680px;margin:0 auto;}
.panel{display:none;}.panel.active{display:block;}
#loading{position:fixed;inset:0;background:rgba(26,58,42,.94);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;color:white;gap:14px;}
.spinner{width:38px;height:38px;border:4px solid rgba(255,255,255,.2);border-top-color:#EF9F27;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#loading p{font-size:13px;opacity:.8;}

/* ── STUDENTS ── */
.search-bar{width:100%;border:2px solid #0F6E56;border-radius:10px;padding:11px 14px;font-size:15px;font-family:inherit;background:#fff;margin-bottom:12px;-webkit-appearance:none;transition:border .2s;}
.search-bar:focus{outline:none;border-color:#1a3a2a;}
.student-count{font-size:11px;color:#888;margin-bottom:10px;}
.az-bar{display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin-bottom:10px;padding-bottom:2px;}
.az-bar::-webkit-scrollbar{display:none;}
.az-btn{flex-shrink:0;min-width:28px;padding:5px 4px;font-size:11px;font-weight:800;border-radius:6px;border:1.5px solid #ddd;background:#fff;color:#555;cursor:pointer;text-align:center;-webkit-tap-highlight-color:transparent;transition:all .15s;}
.az-btn.active{background:#0F6E56;color:#fff;border-color:#0F6E56;}
.az-btn.dimmed{color:#ccc;border-color:#eee;cursor:default;pointer-events:none;}
.student-list{display:flex;flex-direction:column;gap:8px;}
.student-card{background:#fff;border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);cursor:pointer;transition:box-shadow .2s;border-left:4px solid #0F6E56;-webkit-tap-highlight-color:transparent;}
.student-card:hover{box-shadow:0 3px 12px rgba(0,0,0,.12);}
.student-avatar{width:38px;height:38px;border-radius:50%;background:#d4ede1;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#0F6E56;flex-shrink:0;}
.student-info{flex:1;min-width:0;}
.student-name{font-size:14px;font-weight:800;color:#1a3a2a;}
.student-club{font-size:11px;color:#888;margin-top:2px;}
.student-arrow{font-size:14px;color:#ccc;flex-shrink:0;}
.student-edit{font-size:14px;cursor:pointer;color:#ccc;padding:4px;transition:color .2s;flex-shrink:0;}
.student-edit:hover{color:#0F6E56;}
.student-del{font-size:16px;cursor:pointer;color:#ddd;padding:4px;transition:color .2s;flex-shrink:0;}
.student-del:hover{color:#e55;}
.empty-state{text-align:center;padding:48px 20px;color:#999;}
.empty-state .empty-icon{font-size:40px;margin-bottom:12px;}
.empty-state p{font-size:13px;line-height:1.6;}
.add-btn{width:100%;padding:14px;background:#0F6E56;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-tap-highlight-color:transparent;transition:background .2s;}
.add-btn:hover{background:#1a3a2a;}

/* ── PROFILE ── */
.back-btn{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:#0F6E56;font-size:13px;font-weight:700;cursor:pointer;padding:0 0 14px 0;-webkit-tap-highlight-color:transparent;}
.profile-hdr{background:linear-gradient(135deg,#1a3a2a,#0F6E56);border-radius:12px;padding:18px 16px;margin-bottom:14px;display:flex;align-items:center;gap:14px;}
.profile-av{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#EF9F27;flex-shrink:0;}
.profile-hdr-info{flex:1;}
.profile-hdr-name{font-size:17px;font-weight:900;color:#fff;}
.profile-hdr-club{font-size:11px;color:#a8c4b0;margin-top:3px;}
.autosave-ind{font-size:10px;color:#a8c4b0;margin-top:4px;min-height:14px;}
.section-card{background:#fff;border-radius:12px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden;}
.section-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;}
.section-hdr:hover{background:#fafafa;}
.section-title{font-size:13px;font-weight:800;color:#1a3a2a;display:flex;align-items:center;gap:8px;}
.section-chev{font-size:12px;color:#aaa;transition:transform .2s;}
.section-chev.open{transform:rotate(180deg);}
.section-body{display:none;padding:0 16px 16px;}
.section-body.open{display:block;}
.item-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
.item-row{display:flex;align-items:flex-start;gap:8px;background:#f4f4f0;border-radius:8px;padding:10px 12px;}
.item-text{flex:1;font-size:13px;color:#333;line-height:1.5;}
.item-del{background:none;border:none;color:#ccc;cursor:pointer;font-size:15px;padding:0 2px;flex-shrink:0;transition:color .2s;line-height:1;}
.item-del:hover{color:#e55;}
.add-item-row{display:flex;gap:8px;align-items:center;}
.add-item-input{flex:1;border:1.5px solid #ddd;border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit;background:#fafafa;-webkit-appearance:none;transition:border .2s;}
.add-item-input:focus{outline:none;border-color:#0F6E56;background:#fff;}
.add-item-btn{background:#0F6E56;color:#fff;border:none;border-radius:8px;padding:10px 14px;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;}
.fault-card{background:#f4f4f0;border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.fault-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;}
.fault-name{font-size:13px;font-weight:800;color:#1a3a2a;}
.fault-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.visibility-btn{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:4px 9px;border-radius:6px;border:none;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .2s;}
.visibility-btn.private{background:#f0f0ec;color:#999;}
.visibility-btn.shared{background:#eef8f2;color:#0F6E56;border:1px solid #a8d5b8;}
.fault-drills{display:flex;flex-wrap:wrap;gap:5px;}
.drill-chip-sm{font-size:11px;background:#fff;border:1px solid #ddd;border-radius:6px;padding:3px 9px;color:#555;}
.fault-add-select{width:100%;border:1.5px solid #ddd;border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit;background:#fafafa;-webkit-appearance:none;margin-bottom:10px;}
.fault-add-select:focus{outline:none;border-color:#0F6E56;}
.drill-select-area{display:none;margin-bottom:10px;}
.drill-select-label{font-size:11px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.drill-chips-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.drill-sel-chip{font-size:12px;padding:6px 12px;border-radius:8px;border:1.5px solid #ddd;background:#fff;color:#555;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;}
.drill-sel-chip.selected{background:#0F6E56;color:#fff;border-color:#0F6E56;}
.master-toggle{font-size:12px;font-weight:700;color:#0F6E56;background:none;border:none;cursor:pointer;padding:4px 0;display:block;margin-bottom:8px;}
.master-drill-list{display:none;max-height:180px;overflow-y:auto;border:1.5px solid #eee;border-radius:8px;background:#fff;}
.master-drill-list.open{display:block;}
.master-drill-item{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid #f0f0ec;cursor:pointer;}
.master-drill-item:last-child{border-bottom:none;}
.master-drill-item input[type=checkbox]{width:16px;height:16px;accent-color:#0F6E56;flex-shrink:0;}
.master-drill-item span{font-size:12px;color:#333;}
.fault-confirm-btn{width:100%;padding:11px;background:#1a3a2a;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:800;cursor:pointer;margin-top:4px;}
.fault-notes-block{font-size:11px;color:#555;line-height:1.5;background:#f0f7f4;border-left:3px solid #0F6E56;border-radius:0 7px 7px 0;padding:6px 10px;margin-top:7px;font-style:italic;}
.mic-btn{background:none;border:1.5px solid #ddd;border-radius:8px;padding:9px 12px;font-size:16px;cursor:pointer;flex-shrink:0;transition:all .2s;-webkit-tap-highlight-color:transparent;}
.mic-btn.recording{border-color:#c0392b;background:#fdecea;animation:pulse .8s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
.new-lesson-btn{width:100%;padding:13px;background:#EF9F27;color:#1a3a2a;border:none;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-tap-highlight-color:transparent;transition:background .2s;}
.new-lesson-btn:hover{background:#d4881a;}
.lesson-form{background:#fff;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-top:4px solid #EF9F27;}
.lesson-form-title{font-size:14px;font-weight:900;color:#1a3a2a;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.lf-label{font-size:11px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;margin-top:12px;}
.lf-label:first-of-type{margin-top:0;}
.lf-date{width:100%;border:1.5px solid #ddd;border-radius:8px;padding:10px 12px;font-size:15px;font-family:inherit;background:#fafafa;-webkit-appearance:none;margin-bottom:2px;}
.lf-date:focus{outline:none;border-color:#0F6E56;background:#fff;}
.lf-textarea{width:100%;border:1.5px solid #ddd;border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit;background:#fafafa;resize:vertical;min-height:72px;-webkit-appearance:none;}
.lf-textarea:focus{outline:none;border-color:#0F6E56;background:#fff;}
.chip-group{margin-bottom:10px;}
.chip-group-title{font-size:11px;font-weight:800;color:#0F6E56;margin-bottom:6px;}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;}
.sel-chip{font-size:12px;padding:6px 12px;border-radius:8px;border:1.5px solid #ddd;background:#fff;color:#555;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;user-select:none;}
.sel-chip.on{background:#0F6E56;color:#fff;border-color:#0F6E56;}
.sel-chip.hw-on{background:#EF9F27;color:#1a3a2a;border-color:#EF9F27;}
.lf-save-row{display:flex;gap:8px;margin-top:14px;}
.lf-save-btn{flex:1;padding:12px;background:#0F6E56;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;}
.lf-cancel-btn{padding:12px 18px;background:#f0f0ec;color:#666;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;}
.lesson-entry{background:#fff;border-radius:12px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden;}
.lesson-entry-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;gap:10px;}
.lesson-entry-hdr:hover{background:#fafafa;}
.le-date{font-size:13px;font-weight:800;color:#1a3a2a;}
.le-summary{font-size:11px;color:#888;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-left:8px;}
.le-chev{font-size:12px;color:#aaa;transition:transform .2s;flex-shrink:0;}
.le-chev.open{transform:rotate(180deg);}
.lesson-entry-body{display:none;padding:0 16px 16px;border-top:1px solid #f0f0ec;}
.lesson-entry-body.open{display:block;}
.le-section-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#aaa;margin:12px 0 6px;}
.le-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px;}
.le-chip{font-size:11px;background:#eef8f2;border:1px solid #a8d5b8;border-radius:6px;padding:3px 9px;color:#0F6E56;}
.le-chip.hw{background:#fff8ee;border-color:#f0c97a;color:#9a6200;}
.le-text{font-size:13px;color:#444;line-height:1.6;background:#f4f4f0;border-radius:8px;padding:10px 12px;}
.hw-status-row{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}
.hw-status-btn{font-size:11px;font-weight:700;padding:5px 12px;border-radius:8px;border:1.5px solid #ddd;background:#fff;color:#888;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;}
.hw-status-btn.active-done{background:#eef8f2;border-color:#a8d5b8;color:#0F6E56;}
.hw-status-btn.active-partial{background:#fff8ee;border-color:#f0c97a;color:#9a6200;}
.hw-status-btn.active-not{background:#fdecea;border-color:#f0a8a0;color:#c0392b;}
.le-edit-btn{font-size:11px;font-weight:700;color:#0F6E56;background:none;border:none;cursor:pointer;padding:4px 0;margin-top:8px;display:inline-block;}
.le-del-btn{font-size:11px;font-weight:700;color:#ccc;background:none;border:none;cursor:pointer;padding:4px 8px;margin-top:8px;display:inline-block;float:right;}
.le-del-btn:hover{color:#e55;}
.no-lessons{text-align:center;padding:32px 16px;color:#aaa;font-size:13px;}
.new-plan-btn{width:100%;padding:13px;background:#1a3a2a;color:#EF9F27;border:none;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-tap-highlight-color:transparent;transition:background .2s;}
.new-plan-btn:hover{background:#0a2218;}
.plan-form{background:#fff;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-top:4px solid #1a3a2a;}
.plan-form-title{font-size:14px;font-weight:900;color:#1a3a2a;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.pf-label{font-size:11px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;margin-top:12px;}
.pf-label:first-of-type{margin-top:0;}
.pf-input{width:100%;border:1.5px solid #ddd;border-radius:8px;padding:10px 12px;font-size:15px;font-family:inherit;background:#fafafa;-webkit-appearance:none;transition:border .2s;}
.pf-input:focus{outline:none;border-color:#0F6E56;background:#fff;}
.pf-textarea{width:100%;border:1.5px solid #ddd;border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit;background:#fafafa;resize:vertical;min-height:68px;-webkit-appearance:none;}
.pf-textarea:focus{outline:none;border-color:#0F6E56;background:#fff;}
.goals-ref{background:#fffbf0;border-left:3px solid #EF9F27;border-radius:0 8px 8px 0;padding:10px 12px;margin-bottom:4px;font-size:12px;color:#666;line-height:1.6;}
.goals-ref strong{color:#1a3a2a;display:block;font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.pf-save-row{display:flex;gap:8px;margin-top:14px;}
.pf-save-btn{flex:1;padding:12px;background:#1a3a2a;color:#EF9F27;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;}
.pf-cancel-btn{padding:12px 18px;background:#f0f0ec;color:#666;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;}
.plan-drill-search{width:100%;border:1.5px solid #ddd;border-radius:8px;padding:9px 12px;font-size:14px;font-family:inherit;background:#fafafa;margin-bottom:8px;-webkit-appearance:none;}
.plan-drill-search:focus{outline:none;border-color:#0F6E56;background:#fff;}
.plan-drill-cat-bar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.plan-drill-cat-btn{padding:5px 11px;font-size:11px;font-weight:700;border-radius:16px;border:1.5px solid #ddd;background:#fff;color:#666;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.plan-drill-cat-btn.active{background:#0F6E56;color:#fff;border-color:#0F6E56;}
.plan-drill-list{max-height:160px;overflow-y:auto;border:1.5px solid #eee;border-radius:8px;background:#fff;margin-bottom:8px;}
.plan-drill-item{padding:8px 12px;border-bottom:1px solid #f0f0ec;cursor:pointer;font-size:12px;color:#333;-webkit-tap-highlight-color:transparent;}
.plan-drill-item:last-child{border-bottom:none;}
.plan-drill-item:hover{background:#f4f4f0;}
.plan-drill-item.selected{background:#eef8f2;color:#0F6E56;font-weight:700;}
.plan-selected-drills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;min-height:0;}
.plan-drill-chip{font-size:11px;background:#0F6E56;color:#fff;border-radius:6px;padding:4px 10px;display:inline-flex;align-items:center;gap:5px;}
.plan-drill-chip-del{cursor:pointer;font-size:13px;line-height:1;opacity:.7;}
.plan-drill-chip-del:hover{opacity:1;}
.copy-focus-btn{font-size:12px;font-weight:700;color:#0F6E56;background:#eef8f2;border:1px solid #a8d5b8;border-radius:8px;padding:7px 12px;cursor:pointer;margin-bottom:6px;display:inline-block;-webkit-tap-highlight-color:transparent;}
.plan-section-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#888;margin:12px 0 8px;padding-bottom:4px;border-bottom:1px solid #eee;}
.plan-entry{background:#fff;border-radius:12px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden;}
.plan-entry.completed{opacity:.6;}
.plan-entry-hdr{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;}
.plan-entry-hdr:hover{background:#fafafa;}
.pe-status-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.pe-status-dot.upcoming{background:#EF9F27;}
.pe-status-dot.completed{background:#a8d5b8;}
.pe-status-dot.past{background:#ddd;}
.pe-date{font-size:13px;font-weight:800;color:#1a3a2a;white-space:nowrap;}
.pe-time{font-size:11px;color:#888;white-space:nowrap;}
.pe-summary{font-size:11px;color:#888;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pe-chev{font-size:12px;color:#aaa;transition:transform .2s;flex-shrink:0;}
.pe-chev.open{transform:rotate(180deg);}
.plan-entry-body{display:none;padding:0 16px 16px;border-top:1px solid #f0f0ec;}
.plan-entry-body.open{display:block;}
.pe-field-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#aaa;margin:10px 0 4px;}
.pe-field-val{font-size:13px;color:#444;line-height:1.6;background:#f4f4f0;border-radius:8px;padding:9px 12px;}
.plan-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
.convert-btn{flex:1;padding:10px;background:#0F6E56;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;}
.convert-btn:hover{background:#1a3a2a;}
.pe-edit-btn{font-size:11px;font-weight:700;color:#0F6E56;background:none;border:none;cursor:pointer;padding:4px 0;}
.pe-del-btn{font-size:11px;font-weight:700;color:#ccc;background:none;border:none;cursor:pointer;padding:4px 8px;margin-left:auto;}
.pe-del-btn:hover{color:#e55;}
.completed-badge{font-size:10px;font-weight:700;background:#eef8f2;color:#0F6E56;border:1px solid #a8d5b8;border-radius:6px;padding:3px 8px;white-space:nowrap;}
.no-plans{text-align:center;padding:32px 16px;color:#aaa;font-size:13px;}
.planner-student-sel{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.planner-student-sel label{font-size:11px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px;}
.planner-sel-input{width:100%;border:2px solid #0F6E56;border-radius:8px;padding:10px 12px;font-size:15px;font-family:inherit;background:#fafafa;-webkit-appearance:none;}
.planner-sel-input:focus{outline:none;border-color:#1a3a2a;background:#fff;}
.dl-view-tabs{display:flex;gap:0;border-radius:10px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.08);margin-bottom:14px;}
.dl-view-tab{flex:1;padding:11px 8px;font-size:12px;font-weight:800;border:none;cursor:pointer;transition:all .2s;text-align:center;-webkit-tap-highlight-color:transparent;}
.dl-view-tab.active{background:#1a3a2a;color:#EF9F27;}
.dl-view-tab:not(.active){background:#f0f0ec;color:#888;}
.dl-search{width:100%;border:2px solid #0F6E56;border-radius:10px;padding:11px 14px;font-size:15px;font-family:inherit;background:#fff;margin-bottom:10px;-webkit-appearance:none;transition:border .2s;}
.dl-search:focus{outline:none;border-color:#1a3a2a;}
.cat-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.cat-btn{padding:7px 14px;font-size:12px;font-weight:700;border-radius:20px;border:2px solid #ddd;background:#fff;color:#666;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;}
.cat-btn.active{background:#0F6E56;color:#fff;border-color:#0F6E56;}
.dl-count{font-size:11px;color:#888;margin-bottom:10px;}
.drill-card{background:#fff;border-radius:12px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden;}
.drill-card-hdr{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.drill-card-hdr:hover{background:#fafafa;}
.drill-cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.drill-card-name{flex:1;font-size:13px;font-weight:800;color:#1a3a2a;}
.drill-card-cat{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;flex-shrink:0;}
.drill-card-chev{font-size:12px;color:#aaa;transition:transform .2s;flex-shrink:0;}
.drill-card-chev.open{transform:rotate(180deg);}
.drill-card-body{display:none;padding:0 16px 14px;border-top:1px solid #f0f0ec;}
.drill-card-body.open{display:block;}
.drill-body-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#aaa;margin:10px 0 5px;}
.drill-notes-text{font-size:13px;color:#444;line-height:1.6;background:#f4f4f0;border-radius:8px;padding:9px 12px;}
.drill-faults-wrap{display:flex;flex-wrap:wrap;gap:5px;}
.drill-fault-tag{font-size:11px;background:#fff3e0;border:1px solid #f0c97a;border-radius:6px;padding:3px 9px;color:#9a6200;}
.drill-actions{display:flex;gap:8px;margin-top:10px;align-items:center;}
.drill-edit-btn{font-size:11px;font-weight:700;color:#0F6E56;background:none;border:none;cursor:pointer;padding:4px 0;}
.drill-del-btn{font-size:11px;font-weight:700;color:#ccc;background:none;border:none;cursor:pointer;padding:4px 8px;margin-left:auto;}
.drill-del-btn:hover{color:#e55;}
.video-badge{font-size:10px;font-weight:700;background:#fff0f0;color:#c0392b;border:1px solid #f0a8a0;border-radius:6px;padding:3px 8px;}
.add-drill-btn{width:100%;padding:13px;background:#0F6E56;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-tap-highlight-color:transparent;transition:background .2s;}
.add-drill-btn:hover{background:#1a3a2a;}
.drill-form{background:#fff;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-top:4px solid #0F6E56;}
.df-label{font-size:11px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;margin-top:12px;}
.df-label:first-of-type{margin-top:0;}
.df-input{width:100%;border:1.5px solid #ddd;border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit;background:#fafafa;-webkit-appearance:none;transition:border .2s;}
.df-input:focus{outline:none;border-color:#0F6E56;background:#fff;}
.df-textarea{width:100%;border:1.5px solid #ddd;border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit;background:#fafafa;resize:vertical;min-height:60px;-webkit-appearance:none;}
.df-textarea:focus{outline:none;border-color:#0F6E56;background:#fff;}
.df-save-row{display:flex;gap:8px;margin-top:14px;}
.df-save-btn{flex:1;padding:12px;background:#0F6E56;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;}
.df-cancel-btn{padding:12px 18px;background:#f0f0ec;color:#666;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;}
.fault-by-fault{display:flex;flex-direction:column;gap:10px;}
.fbf-card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.fbf-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.fbf-hdr:hover{background:#fafafa;}
.fbf-title{font-size:13px;font-weight:800;color:#1a3a2a;}
.fbf-count{font-size:11px;color:#888;}
.fbf-chev{font-size:12px;color:#aaa;transition:transform .2s;}
.fbf-chev.open{transform:rotate(180deg);}
.fbf-body{display:none;padding:0 16px 14px;}
.fbf-body.open{display:block;}
.fbf-drill-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#f4f4f0;border-radius:8px;margin-bottom:6px;}
.fbf-drill-name{flex:1;font-size:12px;font-weight:700;color:#333;}

/* ── BENCHMARKS ── */
.bench-student-sel{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.bench-student-sel label{font-size:11px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px;}
.bench-sel-input{width:100%;border:2px solid #0F6E56;border-radius:8px;padding:10px 12px;font-size:15px;font-family:inherit;background:#fafafa;-webkit-appearance:none;}
.bench-sel-input:focus{outline:none;border-color:#1a3a2a;background:#fff;}
.bench-test-card{background:#fff;border-radius:12px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden;}
.bench-test-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent;gap:10px;}
.bench-test-hdr:hover{background:#fafafa;}
.bench-test-name{font-size:13px;font-weight:800;color:#1a3a2a;flex:1;}
.bench-test-unit{font-size:10px;color:#888;display:block;margin-top:1px;font-weight:400;}
.bench-level-badge{font-size:11px;font-weight:800;padding:4px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.band-1,.band-2{background:#fde8e8;color:#c0392b;}
.band-3,.band-4{background:#fef3cd;color:#856404;}
.band-5,.band-6{background:#eef8f2;color:#0F6E56;}
.band-7,.band-8{background:#d0e4f7;color:#1a4a7a;}
.band-9,.band-10{background:#ead5f5;color:#6b2fa0;}
.bench-delta{font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px;flex-shrink:0;}
.bench-delta.up{background:#eef8f2;color:#0F6E56;}
.bench-delta.down{background:#fde8e8;color:#c0392b;}
.bench-delta.flat{background:#f0f0f0;color:#999;}
.bench-test-chev{font-size:12px;color:#aaa;transition:transform .2s;flex-shrink:0;}
.bench-test-chev.open{transform:rotate(180deg);}
.bench-test-body{display:none;padding:0 16px 16px;border-top:1px solid #f0f0ec;}
.bench-test-body.open{display:block;}
.bench-desc{font-size:11px;color:#666;line-height:1.6;background:#f0f7f4;border-left:3px solid #0F6E56;border-radius:0 8px 8px 0;padding:8px 12px;margin-bottom:12px;}
.bench-entry-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-bottom:10px;}
.bench-field{display:flex;flex-direction:column;gap:3px;flex:1;min-width:80px;}
.bench-field label{font-size:10px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.5px;}
.bench-field input,.bench-field select{border:1.5px solid #ddd;border-radius:8px;padding:9px 10px;font-size:15px;font-family:inherit;background:#fafafa;-webkit-appearance:none;width:100%;}
.bench-field input:focus,.bench-field select:focus{outline:none;border-color:#0F6E56;background:#fff;}
.bench-log-btn{padding:10px 16px;background:#0F6E56;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;align-self:flex-end;}
.bench-preview{min-height:34px;display:flex;align-items:center;gap:8px;padding:7px 12px;background:#fafafa;border-radius:8px;margin-bottom:10px;border:1px solid #eee;font-size:12px;color:#aaa;}
.bench-log-list{display:flex;flex-direction:column;gap:5px;}
.bench-log-row{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:#f4f4f0;border-radius:7px;font-size:11px;gap:8px;flex-wrap:wrap;}
.bench-log-date{color:#aaa;white-space:nowrap;}
.bench-log-score{font-weight:800;color:#1a3a2a;}
.bench-log-del{cursor:pointer;color:#ddd;font-size:13px;padding:2px 4px;}
.bench-log-del:hover{color:#e55;}
.no-bench-entries{font-size:11px;color:#aaa;padding:4px 0;}

/* scorecard */
.scorecard{background:#fff;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.07);border-top:4px solid #EF9F27;}
.scorecard-title{font-size:14px;font-weight:900;color:#1a3a2a;margin-bottom:4px;}
.scorecard-subtitle{font-size:11px;color:#888;margin-bottom:14px;}
.sc-hole{background:#f4f4f0;border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.sc-hole-title{font-size:12px;font-weight:800;color:#1a3a2a;margin-bottom:8px;}
.sc-hole-desc{font-size:11px;color:#666;margin-bottom:8px;}
.sc-balls{font-size:10px;font-weight:700;color:#888;margin-bottom:6px;}
.sc-options{display:flex;flex-direction:column;gap:5px;}
.sc-option{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;border:1.5px solid #ddd;background:#fff;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;}
.sc-option.selected{background:#eef8f2;border-color:#0F6E56;}
.sc-option input[type=radio]{width:16px;height:16px;accent-color:#0F6E56;flex-shrink:0;}
.sc-option-label{font-size:12px;color:#333;}
.sc-total-row{display:flex;align-items:center;justify-content:space-between;background:#1a3a2a;border-radius:10px;padding:12px 16px;margin-top:12px;margin-bottom:12px;}
.sc-total-label{font-size:12px;font-weight:700;color:#a8c4b0;}
.sc-total-val{font-size:20px;font-weight:900;color:#EF9F27;}
.sc-level-preview{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#f4f4f0;border-radius:10px;margin-bottom:12px;min-height:38px;}
.sc-save-btn{width:100%;padding:13px;background:#0F6E56;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;}
.sc-cancel-btn{width:100%;padding:11px;background:#f0f0ec;color:#666;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;margin-top:8px;}

/* ── STUB ── */
.stub{background:#fff;border-radius:12px;padding:40px 20px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.stub .stub-icon{font-size:36px;margin-bottom:12px;}
.stub h3{font-size:15px;font-weight:800;color:#1a3a2a;margin-bottom:6px;}
.stub p{font-size:12px;color:#888;line-height:1.6;}

/* ── REPORTS ── */
.rpt-student-sel{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.rpt-select-all-row{display:flex;align-items:center;gap:8px;padding:0 0 10px;border-bottom:1px solid #f0f0ec;margin-bottom:8px;}
.rpt-select-all-row label{font-size:12px;font-weight:700;color:#1a3a2a;cursor:pointer;}
.rpt-select-all-row input[type=checkbox]{width:16px;height:16px;accent-color:#0F6E56;cursor:pointer;flex-shrink:0;}
.rpt-student-list{max-height:220px;overflow-y:auto;}
.rpt-student-item{display:flex;align-items:center;gap:10px;padding:8px 2px;border-bottom:1px solid #f4f4f0;}
.rpt-student-item:last-child{border-bottom:none;}
.rpt-student-item input[type=checkbox]{width:16px;height:16px;accent-color:#0F6E56;cursor:pointer;flex-shrink:0;}
.rpt-student-item-info{flex:1;min-width:0;}
.rpt-student-item-name{font-size:13px;font-weight:700;color:#1a3a2a;}
.rpt-student-item-club{font-size:11px;color:#888;margin-top:1px;}
.rpt-generate-btn{width:100%;padding:14px;background:#0F6E56;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-tap-highlight-color:transparent;transition:background .2s;}
.rpt-generate-btn:hover{background:#1a3a2a;}
.rpt-card{background:#fff;border-radius:12px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden;border-top:4px solid #0F6E56;}
.rpt-card-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #f0f0ec;gap:10px;}
.rpt-card-name{font-size:14px;font-weight:900;color:#1a3a2a;}
.rpt-card-status{border:1.5px solid #ddd;border-radius:8px;padding:6px 10px;font-size:11px;font-weight:700;font-family:inherit;background:#fafafa;cursor:pointer;-webkit-appearance:none;}
.rpt-card-textarea{width:100%;border:none;border-bottom:1px solid #f0f0ec;padding:14px 16px;font-size:13px;font-family:'Segoe UI',Arial,sans-serif;background:#fafafa;resize:vertical;min-height:240px;line-height:1.7;outline:none;}
.rpt-card-footer{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#fff;}
.rpt-char-count{font-size:11px;color:#aaa;}
.rpt-print-btn{font-size:12px;font-weight:700;color:#0F6E56;background:none;border:1.5px solid #a8d5b8;border-radius:8px;padding:7px 14px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.rpt-print-btn:hover{background:#eef8f2;}
.rpt-print-all-btn{width:100%;padding:14px;background:#1a3a2a;color:#EF9F27;border:none;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-tap-highlight-color:transparent;transition:background .2s;}
.rpt-print-all-btn:hover{background:#0a2218;}

/* ── OVERLAY ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:540px;padding:20px 20px 36px;box-shadow:0 -8px 32px rgba(0,0,0,.18);max-height:90vh;overflow-y:auto;}
.sheet-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 18px;}
.sheet-title{font-size:16px;font-weight:900;color:#1a3a2a;margin-bottom:16px;}
.fr{display:flex;flex-direction:column;gap:4px;margin-bottom:14px;}
.fr label{font-size:11px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.5px;}
.fr input,.fr select{border:1.5px solid #ddd;border-radius:10px;padding:12px 14px;font-size:16px;font-family:inherit;background:#fafafa;-webkit-appearance:none;transition:border .2s;}
.fr input:focus,.fr select:focus{outline:none;border-color:#0F6E56;background:#fff;}
.sheet-actions{display:flex;gap:8px;margin-top:6px;}
.btn-save{flex:1;padding:14px;background:#0F6E56;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;}
.btn-cancel{padding:14px 20px;background:#f0f0ec;color:#666;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;}
@media(min-width:540px){.overlay{align-items:center;}.sheet{border-radius:20px;margin:16px;}}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><p>Connecting…</p></div>
<div class="gold-bar"></div>
<div class="hdr">
  <div class="hdr-brand">AS Coaching<span>Student Management</span></div>
  <div class="sync-wrap"><div class="sync-dot" id="sync-dot"></div><span id="sync-msg">Connecting…</span></div>
</div>
<div class="tabs">
  <div class="tab active" onclick="showTab('students',this)">👤 Students</div>
  <div class="tab" onclick="showTab('planner-tab',this)">🗓 Planner</div>
  <div class="tab" onclick="showTab('drills-tab',this)">🏌️ Drills</div>
  <div class="tab" onclick="showTab('benchmarks-tab',this)">📊 Benchmarks</div>
  <div class="tab" onclick="showTab('reports-tab',this)">📄 Reports</div>
</div>
<div class="content">

  <!-- STUDENTS -->
  <div id="students" class="panel active">
    <div id="students-list-view">
      <button class="add-btn" onclick="openAddSheet()">➕ Add Student</button>
      <input type="text" class="search-bar" id="search" placeholder="🔍 Search students…" oninput="renderList()">
      <div class="az-bar" id="az-bar"></div>
      <div class="student-count" id="student-count"></div>
      <div class="student-list" id="student-list"></div>
    </div>
    <div id="students-profile-view" style="display:none;">
      <button class="back-btn" onclick="closeProfile()">← Back to Students</button>
      <div id="profile-view-content"></div>
    </div>
  </div>

  <!-- PLANNER TAB -->
  <div id="planner-tab" class="panel">
    <div class="planner-student-sel">
      <label>Select Student</label>
      <select class="planner-sel-input" id="planner-student-select" onchange="loadPlannerForStudent()">
        <option value="">— Select a student —</option>
      </select>
    </div>
    <div id="planner-content"></div>
  </div>

  <!-- DRILL LIBRARY TAB -->
  <div id="drills-tab" class="panel">
    <div class="dl-view-tabs">
      <button class="dl-view-tab active" id="dl-tab-master" onclick="setDrillView('master')">📋 Master List</button>
      <button class="dl-view-tab" id="dl-tab-fault" onclick="setDrillView('fault')">⚠️ By Fault</button>
    </div>
    <div id="dl-master-view">
      <button class="add-drill-btn" onclick="showDrillForm(null)">➕ Add New Drill</button>
      <div id="drill-form-wrap"></div>
      <input type="text" class="dl-search" id="dl-search" placeholder="🔍 Search drills…" oninput="renderDrills()">
      <div class="cat-bar" id="dl-cat-bar"></div>
      <div class="dl-count" id="dl-count"></div>
      <div id="dl-grid"></div>
    </div>
    <div id="dl-fault-view" style="display:none;">
      <div class="fault-by-fault" id="dl-fault-list"></div>
    </div>
  </div>

  <!-- BENCHMARKS TAB -->
  <div id="benchmarks-tab" class="panel">
    <div class="bench-student-sel">
      <label>Select Student</label>
      <select class="bench-sel-input" id="bench-student-select" onchange="loadBenchForStudent()">
        <option value="">— Select a student —</option>
      </select>
    </div>
    <div id="bench-content"></div>
  </div>

  <!-- REPORTS TAB -->
  <div id="reports-tab" class="panel">
    <div class="dl-view-tabs">
      <button class="dl-view-tab active" id="rpt-tab-full" onclick="setReportType('full')">📋 Full Report</button>
      <button class="dl-view-tab" id="rpt-tab-program" onclick="setReportType('program')">🎯 Program Report</button>
    </div>
    <div class="rpt-student-sel">
      <div class="rpt-select-all-row">
        <input type="checkbox" id="rpt-select-all" onchange="toggleSelectAllReports(this.checked)">
        <label for="rpt-select-all">Select All</label>
      </div>
      <div class="rpt-student-list" id="rpt-student-list"></div>
    </div>
    <button class="rpt-generate-btn" onclick="generateReports()">📄 Generate Reports</button>
    <button class="new-plan-btn" onclick="document.getElementById('report-output-area').innerHTML='<p style=\'padding:20px 4px;font-size:14px;color:#1a3a2a;\'>🤖 AI reporting coming soon — connect your API to activate this feature.</p>'">🤖 AI Report</button>
    <div id="report-output-area"></div>
  </div>

</div>

<!-- ADD STUDENT SHEET -->
<div class="overlay" id="add-overlay" onclick="overlayClick(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Add Student</div>
    <div class="fr"><label>Full Name</label><input type="text" id="s-name" placeholder="First & last name" autocomplete="off"></div>

// ── LEVEL CALCULATION ──
function calcLevel(test,v1,v2,gender){
  var g=gender||'M';
  if(test.scoreType==='chs'){
    var s=parseFloat(v1);if(isNaN(s))return null;
    var t=test.thresholds[g];var lv=0;
    for(var i=0;i<t.length;i++){if(s>=t[i])lv=i+1;}return lv||null;
  }
  if(test.scoreType==='linear'){
    var s=parseFloat(v1);if(isNaN(s))return null;
    var t=test.thresholds;
    if(test.inverse){for(var i=t.length-1;i>=0;i--){if(s<=t[i])return i+1;}return 1;}
    else{var lv=0;for(var i=0;i<t.length;i++){if(s>=t[i])lv=i+1;}return lv||null;}
  }
  if(test.scoreType==='dual_drive'){
    var pts=parseFloat(v1),dist=parseFloat(v2);if(isNaN(pts)||isNaN(dist))return null;
    var t=test.thresholds[g];var lv=0;
    for(var i=0;i<t.length;i++){if(pts>=t[i].pts&&dist>=t[i].dist)lv=i+1;}return lv||null;
  }
  if(test.scoreType==='scorecard'){
    return calcScorecardLevel(test.key,parseFloat(v1));
  }
  return null;
}

function calcScorecardLevel(key,total){
  if(isNaN(total))return null;
  if(key==='short_game'){
    // Higher is better — 9 holes, max 36pts
    if(total>=24)return 10;if(total>=21)return 9;if(total>=18)return 8;if(total>=15)return 7;
    if(total>=12)return 6;if(total>=9)return 5;if(total>=7)return 4;if(total>=5)return 3;
    if(total>=3)return 2;return 1;
  }
  if(key==='putting'){
    // 9 putts, lower is better
    if(total<=12)return 10;if(total<=13)return 9;if(total<=14)return 8;if(total<=15)return 7;
    if(total<=16)return 6;if(total<=17)return 5;if(total<=18)return 4;if(total<=19)return 3;
    if(total<=21)return 2;return 1;
  }
  if(key==='par72'){
    if(total<=40)return 10;if(total<=48)return 9;if(total<=56)return 8;if(total<=64)return 7;
    if(total<=72)return 6;if(total<=80)return 5;if(total<=90)return 4;if(total<=100)return 3;
    if(total<=110)return 2;return 1;
  }
  return null;
}

function buildFaultsSection(){var faultCards=(profileData.faults||[]).map(function(f,i){return buildFaultCard(f,i);}).join('');var faultOptions=Object.keys(FAULT_DRILLS).map(function(k){return'<option value="'+k+'">'+k+'</option>';}).join('');return'<div class="section-card"><div class="section-hdr" onclick="toggleSection(\'faults-body\',\'faults-chev\')"><div class="section-title">⚠️ Swing Faults</div><span class="section-chev open" id="faults-chev">▼</span></div><div class="section-body open" id="faults-body"><div id="fault-cards">'+faultCards+'</div><select class="fault-add-select" id="fault-select" onchange="faultSelected()"><option value="">— Select a fault to add —</option>'+faultOptions+'</select><div class="drill-select-area" id="drill-select-area"><div class="drill-select-label">Select prescribed drills for this fault:</div><div class="drill-chips-wrap" id="prescribed-chips"></div><button class="master-toggle" onclick="toggleMasterList()">+ Add from master drill list</button><div class="master-drill-list" id="master-drill-list"></div><div class="drill-select-label" style="margin-top:8px;display:flex;align-items:center;justify-content:space-between;">Fault Notes (optional)<button class="mic-btn" id="mic-fault-notes-input" onclick="startVoice(\'fault-notes-input\')" title="Dictate">🎤</button></div><input type="text" class="fault-add-select" id="fault-notes-input" placeholder="Add context about this fault for this student…"><button class="fault-confirm-btn" id="fault-confirm-btn" onclick="confirmFault()">✓ Add Fault & Drills</button></div></div></div>';}
function buildFaultCard(f,i){var drillChips=(f.drills||[]).map(function(d){return'<span class="drill-chip-sm">'+escHtml(d)+'</span>';}).join('');var visClass=f.shared?'shared':'private',visLabel=f.shared?'👁 Shared':'🔒 Private';return'<div class="fault-card" id="fault-card-'+i+'"><div class="fault-card-top"><div class="fault-name">'+escHtml(f.fault)+'</div><div class="fault-actions"><button class="visibility-btn '+visClass+'" onclick="toggleFaultVisibility('+i+')" id="vis-btn-'+i+'">'+visLabel+'</button><button class="pe-edit-btn" onclick="editFault('+i+')">✏️ Edit</button><button class="item-del" onclick="removeFault('+i+')">✕</button></div></div>'+(drillChips?'<div class="fault-drills">'+drillChips+'</div>':'<div style="font-size:11px;color:#bbb;">No drills assigned</div>')+(f.notes?'<div class="fault-notes-block">'+escHtml(f.notes)+'</div>':'')+'</div>';}
function faultSelected(){var fault=document.getElementById('fault-select').value;var area=document.getElementById('drill-select-area');if(!fault){area.style.display='none';return;}area.style.display='block';var prescribed=FAULT_DRILLS[fault]||[];document.getElementById('prescribed-chips').innerHTML=prescribed.map(function(d){return'<div class="drill-sel-chip" onclick="toggleDrillChip(this)">'+escHtml(d)+'</div>';}).join('');var allNames=drillLibrary.length?drillLibrary.map(function(d){return d.name;}).sort():Object.values(FAULT_DRILLS).flat().filter(function(v,i,a){return a.indexOf(v)===i;}).sort();var masterEl=document.getElementById('master-drill-list');masterEl.classList.remove('open');masterEl.innerHTML=allNames.filter(function(d){return prescribed.indexOf(d)<0;}).map(function(d){return'<label class="master-drill-item"><input type="checkbox" value="'+escAttr(d)+'"><span>'+escHtml(d)+'</span></label>';}).join('');}
function toggleDrillChip(el){el.classList.toggle('selected');}
function toggleMasterList(){document.getElementById('master-drill-list').classList.toggle('open');}
function confirmFault(){var fault=document.getElementById('fault-select').value;if(!fault)return;var drills=[];document.querySelectorAll('#prescribed-chips .drill-sel-chip.selected').forEach(function(c){drills.push(c.textContent);});document.querySelectorAll('#master-drill-list input[type=checkbox]:checked').forEach(function(c){drills.push(c.value);});var notes=(document.getElementById('fault-notes-input').value||'').trim();if(editingFaultIndex!==null){profileData.faults[editingFaultIndex]=Object.assign(profileData.faults[editingFaultIndex],{fault:fault,drills:drills,notes:notes});editingFaultIndex=null;}else{profileData.faults.push({fault:fault,drills:drills,notes:notes,shared:false});}document.getElementById('fault-select').value='';document.getElementById('drill-select-area').style.display='none';document.getElementById('master-drill-list').classList.remove('open');document.getElementById('fault-notes-input').value='';var btn=document.getElementById('fault-confirm-btn');if(btn)btn.textContent='✓ Add Fault & Drills';refreshFaultCards();scheduleAutoSave();}
function editFault(i){editingFaultIndex=i;var f=profileData.faults[i];document.getElementById('fault-select').value=f.fault;faultSelected();var drills=f.drills||[];document.querySelectorAll('#prescribed-chips .drill-sel-chip').forEach(function(c){if(drills.indexOf(c.textContent)>=0)c.classList.add('selected');});document.querySelectorAll('#master-drill-list input[type=checkbox]').forEach(function(c){if(drills.indexOf(c.value)>=0)c.checked=true;});var ni=document.getElementById('fault-notes-input');if(ni)ni.value=f.notes||'';var btn=document.getElementById('fault-confirm-btn');if(btn)btn.textContent='✓ Update Fault & Drills';document.getElementById('drill-select-area').scrollIntoView({behavior:'smooth',block:'nearest'});}
function removeFault(i){if(!confirm('Remove this fault?'))return;profileData.faults.splice(i,1);refreshFaultCards();scheduleAutoSave();}
function toggleFaultVisibility(i){profileData.faults[i].shared=!profileData.faults[i].shared;var btn=document.getElementById('vis-btn-'+i);if(btn){btn.className='visibility-btn '+(profileData.faults[i].shared?'shared':'private');btn.textContent=profileData.faults[i].shared?'👁 Shared':'🔒 Private';}scheduleAutoSave();}
function refreshFaultCards(){var el=document.getElementById('fault-cards');if(!el)return;el.innerHTML=(profileData.faults||[]).map(function(f,i){return buildFaultCard(f,i);}).join('');}

// ── LESSON LOG ──
function buildLessonLogSection(){var entries=lessonData.slice().sort(function(a,b){return b.date<a.date?-1:b.date>a.date?1:0;});var entriesHtml=entries.length?entries.map(function(e,i){return buildLessonEntry(e,i===0);}).join(''):'<div class="no-lessons">No lessons logged yet.</div>';return'<div class="section-card"><div class="section-hdr" onclick="toggleSection(\'lesson-body\',\'lesson-chev\')"><div class="section-title">📝 Lesson Log</div><span class="section-chev open" id="lesson-chev">▼</span></div><div class="section-body open" id="lesson-body"><button class="new-lesson-btn" onclick="showLessonForm(null)">➕ New Lesson</button><div id="lesson-form-wrap"></div><div id="lesson-entries">'+entriesHtml+'</div></div></div>';}
function buildLessonEntry(e,startOpen){var notesChips=(e.notes||[]).map(function(n){return'<span class="le-chip">'+escHtml(n)+'</span>';}).join('');var hwChips=(e.homework||[]).map(function(h){return'<span class="le-chip hw">'+escHtml(h)+'</span>';}).join('');var hwStatus=e.hwStatus||'';var statusBtns=['Done','Partial','Not done'].map(function(s){var cls='hw-status-btn'+(hwStatus===s?' active-'+(s==='Done'?'done':s==='Partial'?'partial':'not'):'');return'<button class="'+cls+'" onclick="setHwStatus(\''+e.id+'\',\''+s+'\')">'+s+'</button>';}).join('');var summary=[];if(e.notes&&e.notes.length)summary.push(e.notes[0]);if(e.freeText)summary.push(e.freeText.slice(0,40)+(e.freeText.length>40?'…':''));return'<div class="lesson-entry" id="le-'+e.id+'"><div class="lesson-entry-hdr" onclick="toggleLeEntry(\''+e.id+'\')"><span class="le-date">'+fmtDate(e.date)+'</span><span class="le-summary">'+escHtml(summary.join(' · ')||'No notes')+'</span><span class="le-chev'+(startOpen?' open':'')+'" id="le-chev-'+e.id+'">▼</span></div><div class="lesson-entry-body'+(startOpen?' open':'')+'" id="le-body-'+e.id+'">'+(notesChips?'<div class="le-section-label">Session Notes</div><div class="le-chips">'+notesChips+'</div>':'')+(e.freeText?'<div class="le-section-label">Notes</div><div class="le-text">'+escHtml(e.freeText)+'</div>':'')+((hwChips||e.hwFreeText)?'<div class="le-section-label">Homework Set</div>'+(hwChips?'<div class="le-chips">'+hwChips+'</div>':'')+(e.hwFreeText?'<div class="le-text" style="margin-top:4px;">'+escHtml(e.hwFreeText)+'</div>':'')+'<div class="le-section-label">Homework Follow-Up</div><div class="hw-status-row">'+statusBtns+'</div>':'')+'<div style="display:flex;justify-content:space-between;align-items:center;"><button class="le-edit-btn" onclick="showLessonForm(\''+e.id+'\')">✏️ Edit</button><button class="le-del-btn" onclick="deleteLesson(\''+e.id+'\')">✕ Delete</button></div></div></div>';}
function toggleLeEntry(id){var body=document.getElementById('le-body-'+id),chev=document.getElementById('le-chev-'+id);if(!body)return;var open=body.classList.toggle('open');if(chev)chev.classList.toggle('open',open);}
function refreshLessonLog(){var el=document.getElementById('lesson-entries');if(!el)return;var entries=lessonData.slice().sort(function(a,b){return b.date<a.date?-1:b.date>a.date?1:0;});el.innerHTML=entries.length?entries.map(function(e){return buildLessonEntry(e,false);}).join(''):'<div class="no-lessons">No lessons logged yet.</div>';}
function showLessonForm(editId){editingLessonId=editId;var existing=editId?lessonData.find(function(e){return e.id===editId;}):null;var faults=profileData.faults||[];var chipGroupsHtml=faults.map(function(f){var drills=(f.drills||[]);if(!drills.length)return'';var chips=drills.map(function(d){var isOn=existing&&(existing.notes||[]).indexOf(d)>=0;return'<span class="sel-chip'+(isOn?' on':'')+'" data-drill="'+escAttr(d)+'" onclick="toggleFormChip(this,\'notes\')">'+escHtml(d)+'</span>';}).join('');return'<div class="chip-group"><div class="chip-group-title">'+escHtml(f.fault)+'</div><div class="chip-row">'+chips+'</div></div>';}).join('');var hwGroupsHtml=faults.map(function(f){var drills=(f.drills||[]);if(!drills.length)return'';var chips=drills.map(function(d){var isOn=existing&&(existing.homework||[]).indexOf(d)>=0;return'<span class="sel-chip'+(isOn?' hw-on':'')+'" data-drill="'+escAttr(d)+'" onclick="toggleFormChip(this,\'hw\')">'+escHtml(d)+'</span>';}).join('');return'<div class="chip-group"><div class="chip-group-title">'+escHtml(f.fault)+'</div><div class="chip-row">'+chips+'</div></div>';}).join('');var formHtml='<div class="lesson-form"><div class="lesson-form-title">'+(editId?'✏️ Edit Lesson':'➕ New Lesson')+'<button onclick="cancelLessonForm()" style="background:none;border:none;font-size:18px;color:#aaa;cursor:pointer;line-height:1;">✕</button></div><div class="lf-label">Date</div><input type="date" class="lf-date" id="lf-date" value="'+(existing?existing.date:today())+'">'+(chipGroupsHtml?'<div class="lf-label">Session Notes</div>'+chipGroupsHtml:'')+'<div class="lf-label" style="display:flex;align-items:center;justify-content:space-between;">Notes<button class="mic-btn" id="mic-lf-free" onclick="startVoice(\'lf-free\')" title="Dictate">🎤</button></div><textarea class="lf-textarea" id="lf-free" placeholder="Observations…">'+(existing?escHtml(existing.freeText||''):'')+'</textarea>'+(hwGroupsHtml?'<div class="lf-label">Homework</div><div id="hw-chips-wrap">'+hwGroupsHtml+'</div>':'')+'<div class="lf-label" style="display:flex;align-items:center;justify-content:space-between;">Homework notes<button class="mic-btn" id="mic-lf-hw-free" onclick="startVoice(\'lf-hw-free\')" title="Dictate">🎤</button></div><textarea class="lf-textarea" id="lf-hw-free" placeholder="Homework notes…" style="min-height:52px;">'+(existing?escHtml(existing.hwFreeText||''):'')+'</textarea><div class="lf-save-row"><button class="lf-cancel-btn" onclick="cancelLessonForm()">Cancel</button><button class="lf-save-btn" onclick="saveLesson()">Save Lesson</button></div></div>';document.getElementById('lesson-form-wrap').innerHTML=formHtml;document.getElementById('lesson-form-wrap').scrollIntoView({behavior:'smooth',block:'start'});}
function toggleFormChip(el,type){if(type==='notes')el.classList.toggle('on');else el.classList.toggle('hw-on');}
function cancelLessonForm(){editingLessonId=null;document.getElementById('lesson-form-wrap').innerHTML='';}
async function saveLesson(){var date=document.getElementById('lf-date').value||today();var freeText=document.getElementById('lf-free').value.trim();var hwFreeText=document.getElementById('lf-hw-free').value.trim();var notes=[],homework=[];document.querySelectorAll('#lesson-form-wrap .sel-chip.on').forEach(function(c){notes.push(c.dataset.drill);});document.querySelectorAll('#lesson-form-wrap .sel-chip.hw-on').forEach(function(c){homework.push(c.dataset.drill);});if(editingLessonId){var idx=lessonData.findIndex(function(e){return e.id===editingLessonId;});if(idx>=0){var ex=lessonData[idx];lessonData[idx]={id:editingLessonId,date:date,notes:notes,freeText:freeText,homework:homework,hwFreeText:hwFreeText,hwStatus:ex.hwStatus||''};}}else{lessonData.push({id:Date.now(),date:date,notes:notes,freeText:freeText,homework:homework,hwFreeText:hwFreeText,hwStatus:''});}await dbSet(lessonsKey(currentStudentId),lessonData);editingLessonId=null;document.getElementById('lesson-form-wrap').innerHTML='';refreshLessonLog();}
async function setHwStatus(entryId,status){var idx=lessonData.findIndex(function(e){return e.id===entryId;});if(idx<0)return;lessonData[idx].hwStatus=status;await dbSet(lessonsKey(currentStudentId),lessonData);document.querySelectorAll('#le-body-'+entryId+' .hw-status-btn').forEach(function(btn){btn.className='hw-status-btn';var s=btn.textContent;if(s===status)btn.className='hw-status-btn active-'+(s==='Done'?'done':s==='Partial'?'partial':'not');});}
async function deleteLesson(entryId){if(!confirm('Delete this lesson entry?'))return;lessonData=lessonData.filter(function(e){return e.id!==entryId;});await dbSet(lessonsKey(currentStudentId),lessonData);refreshLessonLog();}

// ── PLANNER ──
function buildPlannerProfileSection(){var sorted=plannerData.slice().sort(function(a,b){return a.date<b.date?-1:a.date>b.date?1:0;});var upcoming=sorted.filter(function(p){return !p.completed&&!isPast(p.date);});var past=sorted.filter(function(p){return p.completed||isPast(p.date);});var upcomingHtml=upcoming.length?upcoming.map(function(p){return buildPlanEntry(p);}).join(''):'<div class="no-plans">No upcoming sessions planned.</div>';return'<div class="section-card"><div class="section-hdr" onclick="toggleSection(\'planner-profile-body\',\'planner-profile-chev\')"><div class="section-title">🗓 Planner</div><span class="section-chev open" id="planner-profile-chev">▼</span></div><div class="section-body open" id="planner-profile-body"><button class="new-plan-btn" onclick="showPlanForm(null)">➕ Plan a Session</button><div id="plan-form-wrap"></div>'+upcomingHtml+(past.length?'<div class="plan-section-label">Past / Completed</div>'+past.map(function(p){return buildPlanEntry(p);}).join(''):'')+'</div></div>';}
function buildPlanEntry(p){var isCompleted=p.completed;var dotCls=isCompleted?'completed':isPast(p.date)?'past':'upcoming';var summary=p.focus?(p.focus.slice(0,50)+(p.focus.length>50?'…':'')):'No focus set';return'<div class="plan-entry'+(isCompleted?' completed':'')+'" id="pe-'+p.id+'"><div class="plan-entry-hdr" onclick="togglePlanEntry(\''+p.id+'\')"><span class="pe-status-dot '+dotCls+'"></span><span class="pe-date">'+fmtDate(p.date)+'</span>'+(p.time?'<span class="pe-time">'+escHtml(p.time)+'</span>':'')+'<span class="pe-summary">'+escHtml(summary)+'</span>'+(isCompleted?'<span class="completed-badge">✓ Done</span>':'')+'<span class="pe-chev" id="pe-chev-'+p.id+'">▼</span></div><div class="plan-entry-body" id="pe-body-'+p.id+'">'+(p.focus?'<div class="pe-field-label">Focus Areas</div><div class="pe-field-val">'+escHtml(p.focus)+'</div>':'')+(p.drills?renderPlanDrills(p.drills):'')+(p.notes?'<div class="pe-field-label">Notes</div><div class="pe-field-val">'+escHtml(p.notes)+'</div>':'')+(profileData.goals&&profileData.goals.length?'<div class="pe-field-label">Goals</div><div class="goals-ref"><strong>For reference</strong>'+profileData.goals.map(function(g){return'<div>• '+escHtml(g)+'</div>';}).join('')+'</div>':'')+'<div class="plan-actions">'+(!isCompleted?'<button class="convert-btn" onclick="convertToLesson(\''+p.id+'\')">→ Convert to Lesson Log</button>':'')+'<button class="pe-edit-btn" onclick="showPlanForm(\''+p.id+'\')">✏️ Edit</button><button class="pe-del-btn" onclick="deletePlan(\''+p.id+'\')">✕ Delete</button></div></div></div>';}
function togglePlanEntry(id){var body=document.getElementById('pe-body-'+id),chev=document.getElementById('pe-chev-'+id);if(!body)return;var open=body.classList.toggle('open');if(chev)chev.classList.toggle('open',open);}
function showPlanForm(editId){editingPlanId=editId;var existing=editId?plannerData.find(function(p){return p.id===editId;}):null;var preSelected=[];var existingDrillNotes='';if(existing&&existing.drills){try{var parsed=JSON.parse(existing.drills);if(Array.isArray(parsed))preSelected=parsed;}catch(e){existingDrillNotes=existing.drills;}}var formHtml='<div class="plan-form"><div class="plan-form-title">'+(editId?'✏️ Edit Session':'➕ Plan a Session')+'<button onclick="cancelPlanForm()" style="background:none;border:none;font-size:18px;color:#aaa;cursor:pointer;line-height:1;">✕</button></div><div class="pf-label">Date</div><input type="date" class="pf-input" id="pf-date" value="'+(existing?existing.date:today())+'"><div class="pf-label">Time Slot</div><input type="text" class="pf-input" id="pf-time" placeholder="e.g. 9:00am" value="'+(existing?escHtml(existing.time||''):'')+'"><div class="pf-label" style="display:flex;align-items:center;justify-content:space-between;">Focus Areas<button class="mic-btn" id="mic-pf-focus" onclick="startVoice(\'pf-focus\')" title="Dictate">🎤</button></div>'+(profileData.focusAreas&&profileData.focusAreas.length?'<button class="copy-focus-btn" onclick="copyFocusToplan(\'pf\')">📋 Copy from Focus Areas</button>':'')+'<textarea class="pf-textarea" id="pf-focus" placeholder="What will you work on?">'+(existing?escHtml(existing.focus||''):'')+'</textarea><div class="pf-label">Drills / Activities</div>'+buildPlanDrillSelector('pf')+'<div class="pf-label" style="display:flex;align-items:center;justify-content:space-between;">Additional drill notes<button class="mic-btn" id="mic-pf-drills-notes" onclick="startVoice(\'pf-drills-notes\')" title="Dictate">🎤</button></div><textarea class="pf-textarea" id="pf-drills-notes" placeholder="Any extra drill notes…" style="min-height:52px;">'+escHtml(existingDrillNotes)+'</textarea><div class="pf-label" style="display:flex;align-items:center;justify-content:space-between;">Notes<button class="mic-btn" id="mic function renderFaultView(){var el=document.getElementById('dl-fault-list');if(!el)return;el.innerHTML='';Object.keys(FAULT_DRILLS).forEach(function(fault){var drillsForFault=drillLibrary.filter(function(d){return(d.faults||[]).indexOf(fault)>=0;});var card=document.createElement('div');card.className='fbf-card';var bodyId='fbf-body-'+fault.replace(/[^a-z0-9]/gi,'_');card.innerHTML='<div class="fbf-hdr" onclick="toggleFbf(\''+bodyId+'\',\'fbf-chev-'+fault.replace(/[^a-z0-9]/gi,'_')+'\')"><span class="fbf-title">'+escHtml(fault)+'</span><span class="fbf-count">'+drillsForFault.length+' drill'+(drillsForFault.length!==1?'s':'')+'</span><span class="fbf-chev" id="fbf-chev-'+fault.replace(/[^a-z0-9]/gi,'_')+'">▼</span></div><div class="fbf-body" id="'+bodyId+'">'+(drillsForFault.length?drillsForFault.map(function(d){return'<div class="fbf-drill-row"><span class="drill-cat-dot" style="background:'+(CAT_COLORS[d.category]||'#0F6E56')+';"></span><span class="fbf-drill-name">'+escHtml(d.name)+'</span><span style="font-size:10px;color:#aaa;">'+escHtml(d.category)+'</span></div>';}).join(''):'<p style="font-size:11px;color:#aaa;padding:4px 0;">No drills linked.</p>')+'</div>';el.appendChild(card);});}
function toggleFbf(bodyId,chevId){var body=document.getElementById(bodyId),chev=document.getElementById(chevId);if(!body)return;var open=body.classList.toggle('open');if(chev)chev.classList.toggle('open',open);}
function showDrillForm(editId){editingDrillId=editId;var existing=editId?drillLibrary.find(function(d){return d.id===editId;}):null;var catOptions=CATS.map(function(c){return'<option value="'+c+'"'+(existing&&existing.category===c?' selected':'')+'>'+c+'</option>';}).join('');var faultOptions=Object.keys(FAULT_DRILLS).map(function(f){var checked=existing&&(existing.faults||[]).indexOf(f)>=0;return'<label class="master-drill-item"><input type="checkbox" value="'+escAttr(f)+'"'+(checked?' checked':'')+'><span>'+escHtml(f)+'</span></label>';}).join('');var formHtml='<div class="drill-form"><div style="font-size:14px;font-weight:900;color:#1a3a2a;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;">'+(editId?'✏️ Edit Drill':'➕ New Drill')+'<button onclick="cancelDrillForm()" style="background:none;border:none;font-size:18px;color:#aaa;cursor:pointer;line-height:1;">✕</button></div><div class="df-label">Drill Name</div><input type="text" class="df-input" id="df-name" placeholder="Drill name" value="'+(existing?escAttr(existing.name||''):'')+'"><div class="df-label">Category</div><select class="df-input" id="df-cat">'+catOptions+'</select><div class="df-label">Notes</div><textarea class="df-textarea" id="df-notes" placeholder="Coaching notes…">'+(existing?escHtml(existing.notes||''):'')+'</textarea><div class="df-label">Video URL (future use)</div><input type="url" class="df-input" id="df-video" placeholder="https://youtube.com/…" value="'+(existing?escAttr(existing.videoUrl||''):'')+'"><div class="df-label">Link to Faults</div><div class="master-drill-list open" style="max-height:160px;">'+faultOptions+'</div><div class="df-save-row"><button class="df-cancel-btn" onclick="cancelDrillForm()">Cancel</button><button class="df-save-btn" onclick="saveDrill()">Save Drill</button></div></div>';var wrap=document.getElementById('drill-form-wrap');wrap.innerHTML=formHtml;wrap.scrollIntoView({behavior:'smooth',block:'start'});}
function cancelDrillForm(){editingDrillId=null;document.getElementById('drill-form-wrap').innerHTML='';}
async function saveDrill(){var name=document.getElementById('df-name').value.trim();if(!name){alert('Please enter a drill name.');return;}var cat=document.getElementById('df-cat').value;var notes=document.getElementById('df-notes').value.trim();var video=document.getElementById('df-video').value.trim();var faults=[];document.querySelectorAll('#drill-form-wrap input[type=checkbox]:checked').forEach(function(c){faults.push(c.value);});if(editingDrillId){var idx=drillLibrary.findIndex(function(d){return d.id===editingDrillId;});if(idx>=0)drillLibrary[idx]=Object.assign(drillLibrary[idx],{name:name,category:cat,notes:notes,videoUrl:video,faults:faults});}else{drillLibrary.push({id:Date.now(),name:name,category:cat,notes:notes,videoUrl:video,faults:faults});}await dbSet('hub_drills',drillLibrary);editingDrillId=null;document.getElementById('drill-form-wrap').innerHTML='';renderDrills();renderFaultView();}
async function deleteDrill(id){var d=drillLibrary.find(function(x){return x.id===id;});if(!d)return;if(!confirm('Delete "'+d.name+'"?'))return;drillLibrary=drillLibrary.filter(function(x){return x.id!==id;});await dbSet('hub_drills',drillLibrary);renderDrills();renderFaultView();}

function populateBenchStudentSelect(){var sel=document.getElementById('bench-student-select');if(!sel)return;var cur=sel.value;sel.innerHTML='<option value="">— Select a student —</option>';sortByLastName(students).forEach(function(s){var o=document.createElement('option');o.value=s.id;o.textContent=s.name+(s.club?' — '+s.club:'');if(String(s.id)===String(cur))o.selected=true;sel.appendChild(o);});}

async function loadBenchForStudent(){
  var id=document.getElementById('bench-student-select').value;
  var el=document.getElementById('bench-content');
  if(!id){el.innerHTML='';benchStudentId=null;return;}
  benchStudentId=id;
  var s=students.find(function(x){return String(x.id)===String(id);});
  benchData=await dbGet(benchKey(id))||{};
  var gender=s.gender||'M';
  var html='<div style="background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.07);display:flex;align-items:center;gap:12px;"><div style="width:40px;height:40px;border-radius:50%;background:#d4ede1;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#0F6E56;">'+initials(s.name)+'</div><div><div style="font-size:14px;font-weight:800;color:#1a3a2a;">'+s.name+'</div><div style="font-size:11px;color:#888;">'+(s.club||'')+(s.gender?' · '+(s.gender==='F'?'Female':'Male'):'')+'</div></div></div>';
  html+=buildHandicapSection();
