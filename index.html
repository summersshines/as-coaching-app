function buildBenchTestCard(test,gender){
  var logs=(benchData[test.key]||[]).slice().sort(function(a,b){return a.date<b.date?-1:a.date>b.date?1:0;});
  var latest=logs.length?logs[logs.length-1]:null;
  var first=logs.length>1?logs[0]:null;
  var lv=latest?latest.level:null;
  var band=lv?getBand(lv):null;
  var deltaHtml='';
  if(first&&latest&&first.level&&latest.level){var diff=latest.level-first.level;if(diff>0)deltaHtml='<span class="bench-delta up">▲ +'+diff+'</span>';else if(diff<0)deltaHtml='<span class="bench-delta down">▼ '+diff+'</span>';else deltaHtml='<span class="bench-delta flat">—</span>';}
  var levelBadge=lv?'<span class="bench-level-badge '+(band?band.cls:'')+'" >L'+lv+(band?' · '+band.label:'')+'</span>':'<span style="font-size:11px;color:#aaa;">No entries</span>';
  return'<div class="bench-test-card" id="btc-'+test.key+'">'+
    '<div class="bench-test-hdr" onclick="toggleBenchCard(\''+test.key+'\')">'+
    '<div class="bench-test-name">'+test.label+'<span class="bench-test-unit">'+test.unit+'</span></div>'+
    levelBadge+deltaHtml+
    '<span class="bench-test-chev" id="btchev-'+test.key+'">▼</span></div>'+
    '<div class="bench-test-body" id="btbody-'+test.key+'">'+
    '<div class="bench-desc">'+test.desc+'</div>'+
    buildBenchEntryArea(test,gender)+
    buildBenchLogList(test,gender)+
    '</div></div>';
}

function toggleBenchCard(key){var body=document.getElementById('btbody-'+key),chev=document.getElementById('btchev-'+key);if(!body)return;var open=body.classList.toggle('open');if(chev)chev.classList.toggle('open',open);}

function buildBenchEntryArea(test,gender){
  if(test.scoreType==='scorecard'){
    return'<button onclick="openScorecard(\''+test.key+'\')" style="width:100%;padding:11px;background:#EF9F27;color:#1a3a2a;border:none;border-radius:8px;font-size:13px;font-weight:800;cursor:pointer;margin-bottom:10px;">📋 Open Scorecard</button>'+
    '<div id="sc-wrap-'+test.key+'"></div>';
  }
  var fields='';
  if(test.dual){
    fields='<div class="bench-field"><label>'+test.f1+'</label><input type="number" id="bv1-'+test.key+'" placeholder="—" oninput="benchPreview(\''+test.key+'\',\''+gender+'\')"></div>'+
           '<div class="bench-field"><label>'+test.f2+'</label><input type="number" id="bv2-'+test.key+'" placeholder="—" oninput="benchPreview(\''+test.key+'\',\''+gender+'\')"></div>';
  }else{
    fields='<div class="bench-field" style="flex:2;"><label>Score</label><input type="number" id="bv1-'+test.key+'" placeholder="—" oninput="benchPreview(\''+test.key+'\',\''+gender+'\')"></div>';
  }
  if(test.hasDevice){
    fields+='<div class="bench-field"><label>Device</label><select id="bdev-'+test.key+'"><option>Flightscope</option><option>GC Quad</option><option>Trackman</option><option>Other</option></select></div>';
  }
  fields+='<div class="bench-field"><label>Date</label><input type="date" id="bdate-'+test.key+'" value="'+today()+'"></div>'+
          '<div style="align-self:flex-end;"><button class="bench-log-btn" onclick="logBenchEntry(\''+test.key+'\',\''+gender+'\')">+ Log</button></div>';
  return'<div class="bench-entry-row">'+fields+'</div>'+
         '<div class="bench-preview" id="bprev-'+test.key+'">Level will appear as you type</div>';
}

function benchPreview(key,gender){
  var test=BENCH_TESTS.find(function(t){return t.key===key;});if(!test)return;
  var v1El=document.getElementById('bv1-'+key),v2El=document.getElementById('bv2-'+key);
  var v1=v1El?v1El.value:'',v2=v2El?v2El.value:'';
  var prev=document.getElementById('bprev-'+key);if(!prev)return;
  if(!v1&&!v2){prev.textContent='Level will appear as you type';prev.style.color='#aaa';return;}
  var lv=calcLevel(test,v1,v2,gender);
  if(!lv){prev.textContent='Score entered — level will calculate when both fields are filled';prev.style.color='#aaa';return;}
  var band=getBand(lv);var color=BAND_COLORS[lv-1];
  prev.innerHTML='<span style="font-size:11px;color:#666;">Level: </span><span style="font-size:16px;font-weight:900;color:'+color+';">L'+lv+'</span>'+(band?'<span class="bench-level-badge '+band.cls+'" style="margin-left:6px;">'+band.label+'</span>':'');
}

async function logBenchEntry(key,gender){
  var test=BENCH_TESTS.find(function(t){return t.key===key;});if(!test)return;
  var v1El=document.getElementById('bv1-'+key),v2El=document.getElementById('bv2-'+key);
  var v1=v1El?v1El.value.trim():'',v2=v2El?v2El.value.trim():'';
  if(!v1&&!v2){alert('Please enter a score.');return;}
  var date=document.getElementById('bdate-'+key).value||today();
  var device=test.hasDevice&&document.getElementById('bdev-'+key)?document.getElementById('bdev-'+key).value:'';
  var lv=calcLevel(test,v1,v2,gender);
  var entry={id:Date.now(),date:date,v1:v1,v2:v2||'',device:device,level:lv};
  if(!benchData[key])benchData[key]=[];
  benchData[key].push(entry);
  await dbSet(benchKey(benchStudentId),benchData);
  if(v1El)v1El.value='';if(v2El)v2El.value='';
  document.getElementById('bdate-'+key).value=today();
  document.getElementById('bprev-'+key).textContent='Level will appear as you type';
  document.getElementById('bprev-'+key).style.color='#aaa';
  // refresh card
  var s=students.find(function(x){return String(x.id)===String(benchStudentId);});
  var card=document.getElementById('btc-'+key);
  if(card){var newCard=document.createElement('div');newCard.innerHTML=buildBenchTestCard(test,gender);card.replaceWith(newCard.firstChild);}
}

async function deleteBenchEntry(key,entryId,gender){
  if(!confirm('Delete this entry?'))return;
  if(!benchData[key])return;
  benchData[key]=benchData[key].filter(function(e){return e.id!==entryId;});
  await dbSet(benchKey(benchStudentId),benchData);
  var test=BENCH_TESTS.find(function(t){return t.key===key;});
  var card=document.getElementById('btc-'+key);
  if(card&&test){var newCard=document.createElement('div');newCard.innerHTML=buildBenchTestCard(test,gender);card.replaceWith(newCard.firstChild);}
}

function buildBenchLogList(test,gender){
  var logs=(benchData[test.key]||[]).slice().sort(function(a,b){return b.date<a.date?-1:b.date>a.date?1:0;});
  if(!logs.length)return'<p class="no-bench-entries">No entries yet.</p>';
  var rows=logs.slice(0,5).map(function(e){
    var band=e.level?getBand(e.level):null;
    var scoreDisplay=e.v2?e.v1+' / '+e.v2:e.v1;
    if(e.device)scoreDisplay+=' ('+e.device+')';
    return'<div class="bench-log-row">'+
      '<span class="bench-log-date">'+fmtDate(e.date)+'</span>'+
      '<span class="bench-log-score">'+scoreDisplay+'</span>'+
      (e.level?'<span class="bench-level-badge '+(band?band.cls:'')+'" style="font-size:10px;padding:2px 7px;">L'+e.level+'</span>':'<span style="font-size:10px;color:#aaa;">—</span>')+
      '<span class="bench-log-del" onclick="deleteBenchEntry(\''+test.key+'\','+e.id+',\''+gender+'\')">✕</span>'+
      '</div>';
  }).join('');
  var extra=logs.length>5?'<p style="font-size:10px;color:#aaa;padding:4px 2px;">+ '+(logs.length-5)+' earlier entries saved</p>':'';
  return'<div class="bench-log-list">'+rows+'</div>'+extra+buildBenchTrendChart(test);
}

function buildBenchTrendChart(test){
  var all=(benchData[test.key]||[]).slice().sort(function(a,b){return a.date<b.date?-1:a.date>b.date?1:0;});
  var pts=all.filter(function(e){return e.level&&e.level>=1;});
  if(pts.length<2)return'';
  var avgLv=Math.round(pts.reduce(function(s,e){return s+e.level;},0)/pts.length);
  var color=BAND_COLORS[Math.min(avgLv-1,9)];
  var fill=BAND_FILLS[Math.min(avgLv-1,9)];
  var W=280,H=80,padL=22,padR=8,padT=8,padB=22;
  var cW=W-padL-padR,cH=H-padT-padB;
  var n=pts.length;
  function xPos(i){return padL+i*(cW/(n-1));}
  function yPos(lv){return padT+cH-(((lv-1)/9)*cH);}
  var linePts=pts.map(function(e,i){return xPos(i)+','+yPos(e.level);}).join(' ');
  var areaPath='M'+xPos(0)+','+yPos(pts[0].level)+pts.map(function(e,i){return' L'+xPos(i)+','+yPos(e.level);}).join('')+' L'+xPos(n-1)+','+(padT+cH)+' L'+xPos(0)+','+(padT+cH)+' Z';
  var yLabels=[1,5,10].map(function(lv){return'<text x="'+(padL-3)+'" y="'+(yPos(lv)+4)+'" text-anchor="end" font-size="8" fill="#bbb">'+lv+'</text>';}).join('');
  var xLabels='<text x="'+xPos(0)+'" y="'+(H-5)+'" text-anchor="start" font-size="8" fill="#bbb">'+fmtDate(pts[0].date)+'</text>'+
    '<text x="'+xPos(n-1)+'" y="'+(H-5)+'" text-anchor="end" font-size="8" fill="#bbb">'+fmtDate(pts[n-1].date)+'</text>';
  var dots=pts.map(function(e,i){return'<circle cx="'+xPos(i)+'" cy="'+yPos(e.level)+'" r="3" fill="'+color+'" stroke="#fff" stroke-width="1.5"/>';}).join('');
  var svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;display:block;">'+
    '<path d="'+areaPath+'" fill="'+fill+'" opacity="0.5"/>'+
    '<polyline points="'+linePts+'" fill="none" stroke="'+color+'" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'+
    yLabels+xLabels+dots+
    '</svg>';
  return'<div style="margin-top:10px;background:#fafafa;border-radius:8px;padding:8px 10px;"><div style="font-size:10px;font-weight:800;color:#aaa;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;">Progress</div>'+svg+'</div>';
}

function buildHandicapSection(){
  if(!benchData.handicap)benchData.handicap=[];
  var entries=benchData.handicap.slice().sort(function(a,b){return b.date<a.date?-1:b.date>a.date?1:0;});
  var latestVal=entries.length?entries[0].value:'';
  var rows=entries.slice(0,5).map(function(e){
    return'<div class="bench-log-row">'+
      '<span class="bench-log-date">'+fmtDate(e.date)+'</span>'+
      '<span class="bench-log-score">'+e.value+'</span>'+
      '<span class="bench-log-del" onclick="deleteHandicap('+e.id+')">✕</span>'+
      '</div>';
  }).join('');
  var logsHtml=rows?'<div class="bench-log-list" style="margin-top:10px;">'+rows+'</div>':'<p class="no-bench-entries" style="margin-top:8px;">No entries yet.</p>';
  return'<div id="handicap-section" class="bench-test-card">'+
    '<div class="bench-test-hdr" onclick="toggleBenchCard(\'handicap\')">'+
    '<div class="bench-test-name">⛳ Handicap<span class="bench-test-unit">Lower is better</span></div>'+
    (latestVal!==''?'<span style="font-size:13px;font-weight:800;color:#0F6E56;">'+latestVal+'</span>':'')+
    '<span class="bench-test-chev" id="btchev-handicap">▼</span></div>'+
    '<div class="bench-test-body" id="btbody-handicap">'+
    '<div class="bench-entry-row">'+
    '<div class="bench-field"><label>Date</label><input type="date" id="hcap-date" value="'+today()+'"></div>'+
    '<div class="bench-field"><label>Handicap</label><input type="number" id="hcap-val" step="0.1" min="0" placeholder="e.g. 14.4"></div>'+
    '<div style="align-self:flex-end;"><button class="bench-log-btn" onclick="logHandicap()">+ Log</button></div>'+
    '</div>'+
    logsHtml+
    buildHandicapTrendChart()+
    '</div></div>';
}

function buildHandicapTrendChart(){
  var pts=(benchData.handicap||[]).slice().sort(function(a,b){return a.date<b.date?-1:a.date>b.date?1:0;});
  if(pts.length<2)return'';
  var color='#0F6E56';
  var fill='#eef8f2';
  var W=280,H=80,padL=28,padR=8,padT=8,padB=22;
  var cW=W-padL-padR,cH=H-padT-padB;
  var n=pts.length;
  var vals=pts.map(function(e){return parseFloat(e.value);});
  var minV=Math.min.apply(null,vals),maxV=Math.max.apply(null,vals);
  var range=maxV-minV||1;
  function xPos(i){return padL+i*(cW/(n-1));}
  function yPos(v){return padT+cH-((parseFloat(v)-minV)/range)*cH;}
  var linePts=pts.map(function(e,i){return xPos(i)+','+yPos(e.value);}).join(' ');
  var areaPath='M'+xPos(0)+','+yPos(pts[0].value)+pts.map(function(e,i){return' L'+xPos(i)+','+yPos(e.value);}).join('')+' L'+xPos(n-1)+','+(padT+cH)+' L'+xPos(0)+','+(padT+cH)+' Z';
  var yLabelMax='<text x="'+(padL-3)+'" y="'+(padT+8)+'" text-anchor="end" font-size="8" fill="#bbb">'+maxV+'</text>';
  var yLabelMin='<text x="'+(padL-3)+'" y="'+(padT+cH)+'" text-anchor="end" font-size="8" fill="#bbb">'+minV+'</text>';
  var xLabels='<text x="'+xPos(0)+'" y="'+(H-5)+'" text-anchor="start" font-size="8" fill="#bbb">'+fmtDate(pts[0].date)+'</text>'+
    '<text x="'+xPos(n-1)+'" y="'+(H-5)+'" text-anchor="end" font-size="8" fill="#bbb">'+fmtDate(pts[n-1].date)+'</text>';
  var dots=pts.map(function(e,i){return'<circle cx="'+xPos(i)+'" cy="'+yPos(e.value)+'" r="3" fill="'+color+'" stroke="#fff" stroke-width="1.5"/>';}).join('');
  var svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;display:block;">'+
    '<path d="'+areaPath+'" fill="'+fill+'" opacity="0.5"/>'+
    '<polyline points="'+linePts+'" fill="none" stroke="'+color+'" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'+
    yLabelMax+yLabelMin+xLabels+dots+
    '</svg>';
  return'<div style="margin-top:10px;background:#fafafa;border-radius:8px;padding:8px 10px;"><div style="font-size:10px;font-weight:800;color:#aaa;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;">Progress</div>'+svg+'</div>';
}

function refreshHandicapSection(){
  var el=document.getElementById('handicap-section');
  if(!el)return;
  var tmp=document.createElement('div');
  tmp.innerHTML=buildHandicapSection();
  el.replaceWith(tmp.firstChild);
}

async function logHandicap(){
  var date=document.getElementById('hcap-date').value||today();
  var val=document.getElementById('hcap-val').value.trim();
  if(!val){alert('Please enter a handicap value.');return;}
  if(!benchData.handicap)benchData.handicap=[];
  benchData.handicap.push({id:Date.now(),date:date,value:parseFloat(val)});
  await dbSet(benchKey(benchStudentId),benchData);
  refreshHandicapSection();

function scSelect(labelEl){
  // mark selected within its hole
  var group=labelEl.closest('.sc-options');
  if(group)group.querySelectorAll('.sc-option').forEach(function(o){o.classList.remove('selected');});
  labelEl.classList.add('selected');
  // recalculate total
  if(activeScorecardTest)updateScorecardTotal(activeScorecardTest);
}

function updateScorecardTotal(key){
  var prefix=key==='short_game'?'sg':key==='putting'?'put':'p72';
  var holes=key==='short_game'?9:key==='putting'?9:8;
  var total=0;var allFilled=true;
  for(var h=1;h<=holes;h++){
    var checked=document.querySelector('input[name="'+prefix.replace('sg','sg').replace('put','put').replace('p72','p72')+'-h'+h+'"]:checked')||
                document.querySelector('input[name="'+(key==='short_game'?'sg':key==='putting'?'put':'p72')+'-h'+h+'"]:checked');
    if(checked){total+=parseFloat(checked.value);}else{allFilled=false;}
  }
  var totalEl=document.getElementById(prefix+'-total');
  var prevEl=document.getElementById(prefix+'-preview');
  if(totalEl)totalEl.textContent=allFilled?total:'—';
  if(prevEl&&allFilled){
    var lv=calcScorecardLevel(key,total);
    if(lv){var band=getBand(lv);var color=BAND_COLORS[lv-1];prevEl.innerHTML='<span style="font-size:13px;color:#666;">Level: </span><span style="font-size:18px;font-weight:900;color:'+color+';">L'+lv+'</span>'+(band?'<span class="bench-level-badge '+band.cls+'" style="margin-left:6px;">'+band.label+'</span>':'');}
    else{prevEl.innerHTML='<span style="color:#aaa;font-size:12px;">Score: '+total+' — check thresholds</span>';}
  }
}

async function saveScorecard(key){
  var prefix=key==='short_game'?'sg':key==='putting'?'put':'p72';
  var holes=key==='short_game'?9:key==='putting'?9:8;
  var total=0;var allFilled=true;
  for(var h=1;h<=holes;h++){
    var checked=document.querySelector('input[name="'+prefix+'-h'+h+'"]:checked');

function getSBDrillLogs(sbProfile){
  var src=(sbProfile&&sbProfile.drillLogs)?sbProfile.drillLogs:((sbProfile&&sbProfile.drills)?sbProfile.drills:sbProfile);
  var result={};
  if(!src||typeof src!=='object')return result;
  console.log('[Reports] getSBDrillLogs — src keys:',Object.keys(src));
  Object.keys(SCORE_BETTER_DRILLS).forEach(function(did){
    var numKey=did.replace(/^d/,'');
    var data=src[did]||src[numKey]||null;
    if(data&&Array.isArray(data)&&data.length){result[did]=data;}
    else{console.log('[Reports] No log data for drill '+did+' (tried keys "'+did+'" and "'+numKey+'")');}
  });
  console.log('[Reports] getSBDrillLogs — matched drills:',Object.keys(result));
  return result;
}
function buildReportText(student,bData,profile,sbProfile){
  var firstname=(student.name||'').trim().split(' ')[0];
  var goals=(profile.goals||[]).map(function(g){return g.replace(/\n/g,' ').trim();});
  var sbGoal=(sbProfile&&sbProfile.goal)?sbProfile.goal.replace(/\n/g,' ').trim():'';
  var lines=[];
  // Opening
  lines.push('Hi '+firstname+',');
  lines.push('');
  if(goals.length){
    lines.push('It\'s great to see the work you\'re putting in towards '+(goals.length===1?'your goal of "'+goals[0]+'"':'your goals')+'. I\'ve put together this report as an overview of your progress and where we\'re heading together.');
  }else if(sbGoal){
    lines.push('It\'s great to see the work you\'re putting in towards your goal of "'+sbGoal+'". I\'ve put together this report as an overview of your progress and where we\'re heading together.');
  }else{
    lines.push('I\'ve put together this report to give you a clear picture of your current progress and development.');
  }
  var isFullReport=(reportType==='full');
  // Benchmark section (Full Report only)
  if(isFullReport){
    console.log('[Reports] buildReportText benchmark — bData keys:',Object.keys(bData));
    console.log('[Reports] buildReportText benchmark — BENCH_TESTS keys:',BENCH_TESTS.map(function(t){return t.key;}));
    var benchLines=[];
    BENCH_TESTS.forEach(function(test){
      var logs=(bData[test.key]||[]).slice().sort(function(a,b){return a.date<b.date?-1:1;});
      console.log('[Reports] bench "'+test.key+'" — entries found:',logs.length);
      if(!logs.length)return;
      var latest=logs[logs.length-1];
      var band=latest.level?getBand(latest.level):null;
      var line='  '+test.label+': Level '+(latest.level||'—')+(band?' ('+band.label+')':'');
      if(logs.length>1&&logs[0].level&&latest.level){
        var diff=latest.level-logs[0].level;
        line+=diff>0?' — improving ▲':diff<0?' — declining ▼':' — stable';
      }
      benchLines.push(line);
    });
    var hcapEntries=(bData.handicap||[]).slice().sort(function(a,b){return a.date<b.date?-1:1;});
    console.log('[Reports] bench "handicap" — entries found:',hcapEntries.length);
    var hcapLine='';
    if(hcapEntries.length){
      var lh=hcapEntries[hcapEntries.length-1];
      hcapLine='  Handicap: '+lh.value;
      if(hcapEntries.length>1){
        var hd=parseFloat(lh.value)-parseFloat(hcapEntries[0].value);
        hcapLine+=hd<-0.4?' (improving ▼)':hd>0.4?' (trending up ▲)':' (stable)';
      }
    }
    if(benchLines.length||hcapLine){
      lines.push('');
      lines.push('BENCHMARK RESULTS');
      benchLines.forEach(function(l){lines.push(l);});
      if(hcapLine)lines.push(hcapLine);
    }
  }
  // Score Better section
  if(sbProfile){
    console.log('[Reports] buildReportText: sbProfile received, top-level keys:',Object.keys(sbProfile));
    var drillLogs=getSBDrillLogs(sbProfile);
    console.log('[Reports] buildReportText: drillLogs result:',drillLogs);
    var catData={};
    Object.keys(drillLogs).forEach(function(did){
      var drill=SCORE_BETTER_DRILLS[did];if(!drill)return;
      var logs=drillLogs[did].slice().sort(function(a,b){return a.date<b.date?-1:1;});
      var latest=logs[logs.length-1];
      console.log('[Reports] drill '+did+' latest log entry:',latest);
      var pi=latest.pi!==undefined?latest.pi:(latest.score!==undefined?latest.score:(latest.performance_index!==undefined?latest.performance_index:(latest.result!==undefined?latest.result:null)));
      console.log('[Reports] drill '+did+' pi resolved to:',pi);
      if(pi===null||pi===undefined)return;
      if(!catData[drill.cat])catData[drill.cat]=[];
      catData[drill.cat].push({name:drill.name,pi:Math.round(pi)});
    });
    var catKeys=Object.keys(catData);
    if(catKeys.length){
      lines.push('');
      lines.push('PROGRAM DRILL PERFORMANCE');
      catKeys.forEach(function(cat){
        var drills=catData[cat];
        lines.push('');
        lines.push(cat+':');
        var total=0;
        drills.forEach(function(d){lines.push('  '+d.name+': '+(d.pi===0?'0 PI (baseline)':d.pi+' PI'));total+=d.pi;});
        var avg=Math.round(total/drills.length);
        lines.push('  Category average: '+avg+' PI');
        var sorted=drills.slice().sort(function(a,b){return b.pi-a.pi;});
        var best=sorted[0];var worst=sorted[sorted.length-1];var multi=drills.length>1;
        if(avg<20){
          lines.push('  This is an exciting starting point for your '+cat.toLowerCase()+'. These early scores set the baseline, and with dedicated practice I\'m confident we\'ll see real improvement ahead.');
        }else if(avg>70){
          lines.push('  Strong work'+(multi?' — your '+best.name+' score in particular stands out. Keep building on this momentum.':' — your '+best.name+' score reflects real skill and consistency. Keep building on this momentum.'));
        }else if(avg>=50){
          if(multi){lines.push('  You\'re making solid progress, with your '+best.name+' as a real highlight. We\'ll keep working to bring your '+worst.name+' up to the same level.');}
          else{lines.push('  You\'re making solid progress with your '+best.name+'. There\'s still room to develop here and I\'m confident those scores will keep climbing.');}
        }else{
          if(multi){lines.push('  We\'ll continue to develop your '+cat.toLowerCase()+' together, with a particular focus on your '+worst.name+'. Your commitment is showing and those scores will rise.');}
          else{lines.push('  Your '+best.name+' is an area we\'ll continue to develop together. Your commitment is showing and with focused practice those scores will rise.');}
        }
      });
    }
  }
  // Closing
  lines.push('');
  if(goals.length){
    lines.push('Keep working towards your goal of "'+goals[0]+'". I\'m looking forward to our next session and seeing your continued progress.');
  }else if(sbGoal){
    lines.push('Keep working towards your goal of "'+sbGoal+'". I\'m looking forward to our next session and seeing your continued progress.');
  }else{
    lines.push('Keep up the great work and I look forward to our next session together.');
  }
  lines.push('');
  lines.push('Anthony Summers');
  return lines.join('\n');
}

    '.student-name{font-size:18pt;font-weight:900;color:#1a3a2a;margin-bottom:22px;}'+
    '.report-body{white-space:pre-wrap;font-size:12pt;}'+
    '.page-sep{page-break-after:always;height:1px;}'+
    '@media print{body{padding:24px 36px;}}';
  var sections=[];
  cards.forEach(function(card){
    var nameEl=card.querySelector('.rpt-card-name');
    var ta=card.querySelector('.rpt-card-textarea');
    if(!ta)return;
    var studentName=nameEl?nameEl.textContent:'';
    sections.push('<div class="student-name">'+escHtml(studentName)+'</div><div class="report-body">'+escHtml(ta.value)+'</div>');
  });
  var win=window.open('','_blank','width=720,height=960');
  win.document.write(
    '<!DOCTYPE html><html><head><meta charset="utf-8"><title>AS Coaching — Student Reports</title>'+
    '<style>'+css+'</style></head><body>'+
    '<div class="print-hdr"><span class="print-brand">AS Coaching — Student Reports</span><span>'+escHtml(today)+'</span></div>'+
    sections.join('<div class="page-sep"></div>')+
    '</body></html>'
  );
  win.document.close();win.print();
}

// ── SECTION TOGGLE ──
function toggleSection(bodyId,chevId){var body=document.getElementById(bodyId),chev=document.getElementById(chevId);if(!body)return;var open=body.classList.toggle('open');if(chev)chev.classList.toggle('open',open);}

// ── INIT ──
async function init(){
  try{
    await sb.from('jdp_data').select('key').limit(1);
    document.getElementById('sync-dot').className='sync-dot';document.getElementById('sync-msg').textContent='Live';
    students=await dbGet('hub_students')||[];
    renderList();populatePlannerStudentSelect();populateBenchStudentSelect();
    await loadDrillLibrary();
  }catch(e){document.getElementById('sync-dot').className='sync-dot off';document.getElementById('sync-msg').textContent='Error';console.error(e);}
  document.getElementById('loading').style.display='none';
}
init();
</script>
